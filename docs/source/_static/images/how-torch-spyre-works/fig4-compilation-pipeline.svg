<svg viewBox="0 0 660 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#1f2937"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#e55b15"/>
    </marker>
    <marker id="arr-dark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#374151"/>
    </marker>
  </defs>

  <!-- Stage labels (left gutter) -->
  <text transform="translate(12,72)  rotate(-90)" text-anchor="middle" font-size="10" font-weight="700" fill="#374151" letter-spacing="0.8">CAPTURE</text>
  <text transform="translate(12,240) rotate(-90)" text-anchor="middle" font-size="10" font-weight="700" fill="#374151" letter-spacing="0.8">FX GRAPH PASSES</text>
  <text transform="translate(12,420) rotate(-90)" text-anchor="middle" font-size="10" font-weight="700" fill="#374151" letter-spacing="0.8">LOOPLEVEL IR PASSES</text>
  <text transform="translate(12,520) rotate(-90)" text-anchor="middle" font-size="10" font-weight="700" fill="#374151" letter-spacing="0.8">CODEGEN</text>
  <text transform="translate(12,605) rotate(-90)" text-anchor="middle" font-size="10" font-weight="700" fill="#374151" letter-spacing="0.8">IR OUTPUT</text>
  <text transform="translate(12,670) rotate(-90)" text-anchor="middle" font-size="10" font-weight="700" fill="#374151" letter-spacing="0.8">BACKEND</text>

  <!-- Divider lines -->
  <line x1="26" y1="128" x2="554" y2="128" stroke="#eeeeee" stroke-width="1"/>
  <line x1="26" y1="352" x2="554" y2="352" stroke="#eeeeee" stroke-width="1"/>
  <line x1="26" y1="472" x2="554" y2="472" stroke="#eeeeee" stroke-width="1"/>
  <line x1="26" y1="580" x2="554" y2="580" stroke="#eeeeee" stroke-width="1"/>
  <line x1="26" y1="640" x2="554" y2="640" stroke="#eeeeee" stroke-width="1"/>

  <!-- ===================== -->
  <!-- CAPTURE               -->
  <!-- ===================== -->
  <rect x="140" y="14" width="300" height="44" rx="4" fill="#E5E7EB" stroke="#4b5563" stroke-width="1"/>
  <text x="290" y="33" text-anchor="middle" font-size="13.5" font-weight="700" fill="#111827">torch.compile(model)</text>
  <text x="290" y="49" text-anchor="middle" font-size="11" fill="#374151">entry point</text>
  <line x1="290" y1="58" x2="290" y2="74" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="155" y="74" width="270" height="44" rx="4" fill="#E5E7EB" stroke="#4b5563" stroke-width="1"/>
  <text x="290" y="93" text-anchor="middle" font-size="12.5" font-weight="600" fill="#111827">FX Graph Capture</text>
  <text x="290" y="108" text-anchor="middle" font-size="11" fill="#374151">torch._dynamo · AOTAutograd</text>
  <line x1="290" y1="118" x2="290" y2="134" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===================== -->
  <!-- FX GRAPH PASSES       -->
  <!-- Operate on the FX Graph before Inductor lowers to LoopLevel IR -->
  <!-- ===================== -->

  <!-- enable_spyre_context (first, since it registers decomps/lowerings used downstream) -->
  <rect x="110" y="134" width="360" height="46" rx="4" fill="#c14a0f"/>
  <text x="290" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">enable_spyre_context()</text>
  <text x="290" y="166" text-anchor="middle" font-size="10.5" fill="#ffd8b8">Registers decompositions, lowerings, Inductor config overrides</text>
  <line x1="290" y1="180" x2="290" y2="192" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Pre-grad padding -->
  <rect x="110" y="192" width="360" height="38" rx="4" fill="#e55b15"/>
  <text x="290" y="209" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Padding Insertion</text>
  <text x="290" y="223" text-anchor="middle" font-size="10.5" fill="#ffe4d0">insert_padding — pad tensors to hardware-friendly shapes</text>
  <line x1="290" y1="230" x2="290" y2="242" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Graph rewrites (post-grad passes) -->
  <rect x="110" y="242" width="360" height="62" rx="4" fill="#e55b15"/>
  <text x="290" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Graph Rewrites</text>
  <text x="290" y="276" text-anchor="middle" font-size="10" fill="#ffffff">recover_spyre_hints restores spyre_hint annotations</text>
  <text x="290" y="289" text-anchor="middle" font-size="10.5" fill="#ffffff">relayout_linear_weights · mm_to_bmm_pass (2D → 3D)</text>
  <text x="290" y="302" text-anchor="middle" font-size="10.5" fill="#ffe4d0">bmm_unflatten_pass</text>
  <line x1="290" y1="304" x2="290" y2="322" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Inductor lowering to LoopLevel IR -->
  <rect x="155" y="322" width="270" height="26" rx="3" fill="#E5E7EB" stroke="#4b5563" stroke-width="1"/>
  <text x="290" y="339" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">▸ Inductor lowers FX Graph → LoopLevel IR</text>

  <!-- ===================== -->
  <!-- LOOPLEVEL IR PASSES   -->
  <!-- Operate on Inductor's IR before codegen -->
  <!-- ===================== -->

  <rect x="110" y="358" width="360" height="40" rx="4" fill="#e55b15"/>
  <text x="290" y="376" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Layout Propagation</text>
  <text x="290" y="390" text-anchor="middle" font-size="10" fill="#ffe4d0">propagate_spyre_tensor_layouts() — FixedLayout → FixedTiledLayout</text>
  <line x1="290" y1="398" x2="290" y2="408" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="110" y="408" width="360" height="40" rx="4" fill="#e55b15"/>
  <text x="290" y="426" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Work Division &amp; Scratchpad Planning</text>
  <text x="290" y="440" text-anchor="middle" font-size="10" fill="#ffe4d0">span_reduction() · work_distribution() · scratchpad_planning (optional)</text>
  <line x1="290" y1="448" x2="290" y2="456" stroke="#374151" stroke-width="1"/>

  <!-- Inductor Scheduler + Fusion (standard) -->
  <rect x="140" y="456" width="300" height="20" rx="3" fill="#E5E7EB" stroke="#4b5563" stroke-width="1"/>
  <text x="290" y="470" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">▸ Inductor Scheduler + Fusion (PyTorch-standard)</text>

  <!-- ===================== -->
  <!-- CODEGEN               -->
  <!-- ===================== -->
  <rect x="140" y="482" width="300" height="38" rx="4" fill="#e55b15"/>
  <text x="290" y="499" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">SpyreKernel Codegen</text>
  <text x="290" y="513" text-anchor="middle" font-size="10.5" fill="#ffffff">OpSpec → expression tree → generate_sdsc()</text>
  <line x1="290" y1="520" x2="290" y2="530" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="140" y="530" width="300" height="38" rx="4" fill="#e55b15"/>
  <text x="290" y="547" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Wrapper Codegen</text>
  <text x="290" y="561" text-anchor="middle" font-size="10.5" fill="#ffffff">Allocate tiled buffers · launch compiled kernel</text>
  <line x1="290" y1="568" x2="290" y2="586" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===================== -->
  <!-- IR OUTPUT             -->
  <!-- ===================== -->
  <rect x="88" y="586" width="404" height="40" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="603" text-anchor="middle" font-size="12" font-weight="700" fill="#dbeafe">SuperDSC IR  (JSON tile-level compute graph)</text>
  <text x="290" y="617" text-anchor="middle" font-size="10.5" fill="#bfdbfe">Core fold properties · coordinate info · schedule tree · op specs for 32 cores</text>

  <!-- KTIR annotation -->
  <line x1="494" y1="604" x2="520" y2="604" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-orange)"/>
  <rect x="522" y="584" width="122" height="42" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="522" y="584" width="122" height="16" rx="4" fill="#d97706"/>
  <rect x="522" y="592" width="122" height="8" fill="#d97706"/>
  <text x="583" y="596" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">KTIR (future)</text>
  <text x="583" y="610" text-anchor="middle" font-size="10" fill="#92400e">MLIR-based community IR</text>

  <line x1="290" y1="626" x2="290" y2="646" stroke="#374151" stroke-width="1.5" marker-end="url(#arr-dark)"/>

  <!-- ===================== -->
  <!-- BACKEND               -->
  <!-- ===================== -->
  <rect x="140" y="646" width="300" height="38" rx="4" fill="#0f172a"/>
  <text x="290" y="663" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Backend Compiler (Deeptools)</text>
  <text x="290" y="677" text-anchor="middle" font-size="10.5" fill="#cbd5e1">Device binary → Execute on Spyre hardware</text>

  <!-- Legend -->
  <rect x="88"  y="698" width="12" height="10" rx="2" fill="#e55b15"/>
  <text x="104" y="707" font-size="11.5" fill="#1f2937">Spyre-specific</text>
  <rect x="210" y="698" width="12" height="10" rx="2" fill="#E5E7EB" stroke="#4b5563" stroke-width="1"/>
  <text x="226" y="707" font-size="11.5" fill="#1f2937">PyTorch-standard</text>
  <rect x="355" y="698" width="12" height="10" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="371" y="707" font-size="11.5" fill="#1f2937">IR artifact</text>
  <rect x="440" y="698" width="12" height="10" rx="2" fill="#0f172a"/>
  <text x="456" y="707" font-size="11.5" fill="#1f2937">Spyre hardware</text>
</svg>
