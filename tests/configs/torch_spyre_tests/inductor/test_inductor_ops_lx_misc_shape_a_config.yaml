# LX-planning shard: inductor_ops family 'misc_shape_a', both wrap classes
# (LxPlanningTwoOpPointwiseAdditionTest '(x + x) / 2' and
#  LxPlanningTwoOpReductionTest 'torch.sum(x, dim=0)').
#
# Auto-split of test_inductor_ops_lx_planning.py, mirroring the
# test_inductor_ops.py config sharding. The full (non-truncated) test
# set is enabled in CI via TEST_LX_PLANNING_FULL=1 + TEST_LX_PLANNING_RUN_SKIPS=1
# (see .github/workflows/_test_matrix.yaml). The xfail lists below are
# the source of truth for known LX-planning failures (the in-file .py
# skip-lists were removed as duplicates).
test_suite_config:
  labels: [full]
  files:
    - path: ${TORCH_DEVICE_ROOT}/tests/inductor/test_inductor_ops_lx_planning.py
      unlisted_test_mode: skip
      tests:
        # Known LX-planning failures -- run and expected to fail. Non-strict
        # xfail: an unexpected pass (XPASS) does not fail CI. Entries failing
        # in both wraps collapse to (pointwise|reduction).
        - names:
            - LxPlanning.*::test_full_value_1_lx_planning_(pointwise|reduction)
          mode: xfail
        - names:
            - LxPlanning.*::test_split.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_arange.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_full.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_new_ones.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_numel.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_ones.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_zeros.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_empty_like.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_clone.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_copy_roundtrip.*_lx_planning_(pointwise|reduction)
          mode: mandatory_success
          tags:
            - ops__inductor_misc_shape
