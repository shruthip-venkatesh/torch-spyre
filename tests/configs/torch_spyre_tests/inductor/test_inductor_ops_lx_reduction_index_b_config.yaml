# LX-planning shard: inductor_ops family 'reduction_index_b', both wrap classes
# (LxPlanningTwoOpPointwiseAdditionTest '(x + x) / 2' and
#  LxPlanningTwoOpReductionTest 'torch.sum(x, dim=0)').
#
# Auto-split of test_inductor_ops_lx_planning.py, mirroring the
# test_inductor_ops.py config sharding. The full (non-truncated) test
# set is enabled in CI via TEST_LX_PLANNING_FULL=1 + TEST_LX_PLANNING_RUN_SKIPS=1
# (see .github/workflows/_test_matrix.yaml). The xfail lists below are
# the source of truth for known LX-planning failures (the in-file .py
# skip-lists were removed as duplicates).
test_suite_config:
  labels: [full]
  files:
    - path: ${TORCH_DEVICE_ROOT}/tests/inductor/test_inductor_ops_lx_planning.py
      unlisted_test_mode: skip
      tests:
        # Known LX-planning failures -- run and expected to fail. Non-strict
        # xfail: an unexpected pass (XPASS) does not fail CI. Entries failing
        # in both wraps collapse to (pointwise|reduction).
        - names:
            - LxPlanning.*::test_aminmax_keepdim0_aminmax_2d_dim_0_lx_planning_pointwise
            - LxPlanning.*::test_mean_keepdim1_mean_fp16_2d_dim_1_lx_planning_pointwise
            - LxPlanning.*::test_mean_keepdim1_mean_fp16_2d_dim_0_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_mean_keepdim0_mean_fp16_3d_dim_1_lx_planning_reduction
          mode: xfail
        - names:
            - LxPlanning.*::test_aminmax_keepdim.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_sum_keepdim0.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_sum_keepdim1.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_mean_keepdim0.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_mean_keepdim1.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_vector_norm_keepdim.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_matrix_norm_keepdim.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_linalg_norm_keepdim.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_argmin_keepdim0.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_min_tuple_output_keepdim0.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_logsumexp_keepdim0_known_xfail.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_mean_3d_dim0_keepdim.*_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_index_copy_.*_lx_planning_(pointwise|reduction)
          mode: mandatory_success
