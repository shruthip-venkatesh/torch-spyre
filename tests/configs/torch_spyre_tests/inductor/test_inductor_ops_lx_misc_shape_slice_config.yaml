# LX-planning shard: inductor_ops family 'misc_shape_slice', both wrap classes
# (LxPlanningTwoOpPointwiseAdditionTest '(x + x) / 2' and
#  LxPlanningTwoOpReductionTest 'torch.sum(x, dim=0)').
#
# Auto-split of test_inductor_ops_lx_planning.py, mirroring the
# test_inductor_ops.py config sharding. The full (non-truncated) test
# set is enabled in CI via TEST_LX_PLANNING_FULL=1 + TEST_LX_PLANNING_RUN_SKIPS=1
# (see .github/workflows/_test_matrix.yaml). The xfail lists below are
# the source of truth for known LX-planning failures (the in-file .py
# skip-lists were removed as duplicates).
test_suite_config:
  labels: [full]
  files:
    - path: ${TORCH_DEVICE_ROOT}/tests/inductor/test_inductor_ops_lx_planning.py
      unlisted_test_mode: skip
      tests:
        # Known LX-planning failures -- run and expected to fail. Non-strict
        # xfail: an unexpected pass (XPASS) does not fail CI. Entries failing
        # in both wraps collapse to (pointwise|reduction).
        - names:
            - LxPlanning.*::test_slice_stick_reduce_dim2_sum_3d64_0_lx_planning_(pointwise|reduction)
            - LxPlanning.*::test_slice_stick_reduce_dim2_amax_3d64_0_lx_planning_pointwise
            - LxPlanning.*::test_slice_add_3d1s0_lx_planning_reduction
            - LxPlanning.*::test_slice_add_3d1s1_lx_planning_reduction
            - LxPlanning.*::test_slice_add_3d1s2_lx_planning_reduction
            - LxPlanning.*::test_slice_add_3d2s0_lx_planning_reduction
            - LxPlanning.*::test_slice_add_3d2s1_lx_planning_reduction
            - LxPlanning.*::test_slice_add_3d2s2_lx_planning_reduction
            - LxPlanning.*::test_slice_stick_clone_3d128_01_lx_planning_reduction
            - LxPlanning.*::test_slice_stick_clone_3d64_01_lx_planning_reduction
            - LxPlanning.*::test_slice_stick_reduce_dim2_sum_3d128_01_lx_planning_reduction
            - LxPlanning.*::test_slice_stick_reduce_dim2_sum_3d64_01_lx_planning_reduction
          mode: xfail
        - names:
            - LxPlanning.*::test_slice.*_lx_planning_(pointwise|reduction)
          mode: mandatory_success
          tags:
            - ops__inductor_misc_shape
