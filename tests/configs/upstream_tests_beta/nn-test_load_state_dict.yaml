test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/nn/test_load_state_dict.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise state dict loading and assignment behaviors, including warning conditions.
        # They are classified as mandatory_success because state dict operations are fundamental to model persistence and loading.
        # Relevant Spyre capabilities include tensor manipulation and state management, with no specific limitations noted.
        - names:
            - TestLoadStateDict::test_load_state_dict_warn_assign_swap_False
          mode: mandatory_success
        # These tests exercise various aspects of loading state dicts, including handling of metadata, shape and stride assignments, optimizer states, and custom loaders.
        # They are classified as 'skip' on the Spyre backend because they do not directly test operations or data types supported by Spyre, and their relevance to the backend is minimal.
        # The most relevant Spyre capabilities are tensor manipulation and state management, but these tests focus on higher-level state dict functionalities not directly tied to backend operations.
        - names:
            - TestLoadStateDict::test_load_state_dict
            - TestLoadStateDict::test_load_state_dict_warn_assign
            - TestLoadStateDict::test_load_state_dict_BC
            - TestLoadStateDict::test_load_state_dict_BC_swap_False
            - TestLoadStateDict::test_load_state_dict_BC_swap_True
            - TestLoadStateDict::test_load_state_dict_assign_meta
            - TestLoadStateDict::test_load_state_dict_assign_meta_swap_False_keep_vars_False
            - TestLoadStateDict::test_load_state_dict_assign_meta_swap_False_keep_vars_True
            - TestLoadStateDict::test_load_state_dict_assign_meta_swap_True_keep_vars_False
            - TestLoadStateDict::test_load_state_dict_assign_meta_swap_True_keep_vars_True
            - TestLoadStateDict::test_load_state_dict_assign_shape_stride
            - TestLoadStateDict::test_load_state_dict_assign_shape_stride_swap_False
            - TestLoadStateDict::test_load_state_dict_assign_shape_stride_swap_True
            - TestLoadStateDict::test_load_state_dict_assign_with_optimizer
            - TestLoadStateDict::test_load_state_dict_assign_with_optimizer_swap_False
            - TestLoadStateDict::test_load_state_dict_assign_with_optimizer_swap_True
            - TestLoadStateDict::test_load_state_dict_child
            - TestLoadStateDict::test_load_state_dict_child_swap_False
            - TestLoadStateDict::test_load_state_dict_child_swap_True
            - TestLoadStateDict::test_load_state_dict_custom
            - TestLoadStateDict::test_load_state_dict_custom_swap_False
            - TestLoadStateDict::test_load_state_dict_custom_swap_True
            - TestLoadStateDict::test_load_state_dict_invalid
            - TestLoadStateDict::test_load_state_dict_invalid_swap_False
            - TestLoadStateDict::test_load_state_dict_invalid_swap_True
            - TestLoadStateDict::test_load_state_dict_ref_cycle
            - TestLoadStateDict::test_load_state_dict_ref_cycle_swap_False
            - TestLoadStateDict::test_load_state_dict_swap_False
            - TestLoadStateDict::test_load_state_dict_swap_True
            - TestLoadStateDict::test_load_state_dict_type
            - TestLoadStateDict::test_load_state_dict_type_swap_False
            - TestLoadStateDict::test_load_state_dict_type_swap_True
            - TestLoadStateDict::test_load_state_dict_warn_assign_swap_True
            - TestLoadStateDict::test_load_state_dict_with_unexpected_key
            - TestLoadStateDict::test_load_state_dict_with_unexpected_key_swap_False
            - TestLoadStateDict::test_load_state_dict_with_unexpected_key_swap_True
            - TestLoadStateDict::test_scalar_param_1d_tensor_raises
            - TestLoadStateDict::test_scalar_param_1d_tensor_raises_swap_False
            - TestLoadStateDict::test_scalar_param_1d_tensor_raises_swap_True
            - TestLoadStateDictSwap::test_swap_subclass
            - TestLoadStateDictSwap::test_swap_subclass_swap_True_assign_False
            - TestLoadStateDictSwap::test_swap_subclass_swap_True_assign_True
          mode: skip  # does not engage the torch-spyre layer

