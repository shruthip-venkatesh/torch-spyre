test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/profiler/test_torch_tidy.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise various aspects of tensor operations, including allocation, memory management, and tensor properties.
        # They are classified as mandatory_success because they validate core functionalities that are essential for the Spyre backend.
        # Relevant Spyre capabilities include tensor allocation, memory management, and support for various tensor operations and data types.
        - names:
            - TestTorchTidyProfiler::test_allocation_id_uniqueness
          mode: mandatory_success
        - names:
            - TestTorchTidyProfiler::test_allocation_ids
            - TestTorchTidyProfiler::test_allocation_ids_with_other_ops
            - TestTorchTidyProfiler::test_allocations
            - TestTorchTidyProfiler::test_extra_fields
            - TestTorchTidyProfiler::test_impl_reuse
            - TestTorchTidyProfiler::test_mkldnn_tensors
            - TestTorchTidyProfiler::test_module_and_optimizer_ids
            - TestTorchTidyProfiler::test_nnmodule_params
            - TestTorchTidyProfiler::test_optimizer
            - TestTorchTidyProfiler::test_optimizer_parameters_adam
            - TestTorchTidyProfiler::test_optimizer_parameters_sgd
            - TestTorchTidyProfiler::test_pointers_and_ids
            - TestTorchTidyProfiler::test_refcounts
            - TestTorchTidyProfiler::test_scalar_ins
            - TestTorchTidyProfiler::test_sparse_tensors
            - TestTorchTidyProfiler::test_tensor_lists
            - TestTorchTidyProfiler::test_tensor_properties
            - TestTorchTidyProfiler::test_tensorimpl_invalidation_full
            - TestTorchTidyProfiler::test_tensorimpl_invalidation_keep_alive
            - TestTorchTidyProfiler::test_tensorimpl_invalidation_scalar_args
            - TestTorchTidyProfiler::test_tensorimpl_invalidation_set
          mode: skip

  global:
    supported_dtypes:
      - name: bfloat16
      - name: bool
      - name: float16
      - name: float32
      - name: int64
