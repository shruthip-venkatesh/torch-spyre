          mode: mandatory_success
        # These tests exercise the `addcdiv` operation with different dtypes, focusing on tensor operations and broadcasting.
        # They are classified as `mandatory_success` because the Spyre backend must support these operations for basic functionality.
        # The primary limitation is the unsupported `float32` dtype, which causes an `InductorError` due to unexpected arguments.
        - names:
            - TestTorchDeviceType::test_addcdiv
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: float32
        # # These tests exercise tensor operations with various dtypes, including unsupported ones like float8_e4m3fn and float8_e5m2fnuz.
        # # They are classified as mandatory_success because the Spyre backend must support all listed dtypes and ops for full compatibility.
        # # The most relevant Spyre limitations are the lack of support for certain dtypes and the unimplemented "mul_cpu_reduced_float" op.
        # - names:
        #     - TestTorchDeviceType::test_item
        #   mode: mandatory_success
        #   edits:
        #     dtypes:
        #       exclude:
        #         - name: bool
        #         - name: float16
        #         - name: float32
        # These tests exercise a wide range of PyTorch operations, including tensor manipulations, mathematical operations, and gradient scaling, across various data types.
        # They are classified as xfail on the Spyre backend due to unsupported operations, data types, and memory formats, as well as missing features like deterministic paths and non-deterministic alerts.
        # The most relevant Spyre capabilities include support for bfloat16, bool, float16, float32, and int64 data types, and a subset of operations that are fully supported across all these types. Limitations include unsupported complex half data types, non-contiguous memory formats, and missing deterministic paths for certain operations.
