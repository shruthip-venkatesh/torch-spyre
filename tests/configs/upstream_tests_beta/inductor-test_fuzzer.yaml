test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/inductor/test_fuzzer.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise configuration fuzzing and exception handling in PyTorch, focusing on CPU-based operations.
        # They are classified as mandatory_success because they do not interact with the Spyre backend, which is GPU-specific.
        # Relevant Spyre capabilities include GPU-specific operations and optimizations, which are not tested here.
        - names:
            - TestConfigFuzzer::test_config_fuzzer_bisector_boolean
          mode: mandatory_success
        # These tests exercise various fuzzing and sampling methods without specific operations or dtypes.
        # They are classified as 'skip' because they do not interact with the torch-spyre layer.
        # Relevant Spyre capabilities include handling unsupported ops and dtypes gracefully.
        - names:
            - TestConfigFuzzer::test_config_fuzzer_dynamo_bisect
            - TestConfigFuzzer::test_config_fuzzer_inductor_gpu
            - TestConfigFuzzer::test_fuzzer_inductor_calling_compile
            - TestConfigFuzzer::test_fuzzer_running_test
            - TestConfigFuzzer::test_sampling_method_random
            - TestConfigFuzzer::test_sampling_method_toggle
            - TestConfigFuzzer::test_config_fuzzer_bisector_exception
            - TestConfigFuzzer::test_config_fuzzer_inductor_bisect
            - TestConfigFuzzer::test_config_fuzzer_inductor_cpu
            - TestConfigFuzzer::test_config_fuzzer_n_tuple
          mode: skip  # does not engage the torch-spyre layer

  global:
    supported_dtypes:
      - name: bfloat16
      - name: bool
      - name: float16
      - name: float32
      - name: int64
    supported_ops:
