test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/nn/test_init.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise PyTorch's initialization functions, focusing on deprecation warnings and handling of zero-element tensors.
        # They are classified as mandatory_success because they verify basic functionality and error handling, which are critical for compatibility.
        # Relevant Spyre capabilities include support for various dtypes and ops, ensuring these tests pass without issues.
        - names:
            - TestNNInit::test_deprecation
          mode: mandatory_success
        # These tests exercise various initialization methods and their constraints, including tensor dimensions and data types.
        # They are classified as 'skip' because they do not engage the torch-spyre layer, focusing on CPU-based operations.
        # Relevant Spyre capabilities include support for specific dtypes and ops, but these tests do not leverage the accelerator backend.
        - names:
            - TestNNInit::test_kaiming_normal_warning_on_0element_tensor
            - TestNNInit::test_kaiming_uniform_warning_on_0element_tensor
            - TestNNInit::test_calculate_gain_leaky_relu
            - TestNNInit::test_calculate_gain_leaky_relu_only_accepts_numbers
            - TestNNInit::test_calculate_gain_linear
            - TestNNInit::test_calculate_gain_nonlinear
            - TestNNInit::test_calculate_gain_only_accepts_valid_nonlinearities
            - TestNNInit::test_constant
            - TestNNInit::test_dirac_identity
            - TestNNInit::test_dirac_only_works_on_3_4_5d_inputs
            - TestNNInit::test_dirac_properties
            - TestNNInit::test_eye
            - TestNNInit::test_eye_only_works_on_2d_inputs
            - TestNNInit::test_kaiming_normal
            - TestNNInit::test_kaiming_normal_errors_on_inputs_smaller_than_2d
            - TestNNInit::test_kaiming_uniform
            - TestNNInit::test_kaiming_uniform_errors_on_inputs_smaller_than_2d
            - TestNNInit::test_normal
            - TestNNInit::test_ones_and_zeros
            - TestNNInit::test_orthogonal
            - TestNNInit::test_sparse_default_std
            - TestNNInit::test_sparse_only_works_on_2d_inputs
            - TestNNInit::test_trunc_normal_generator
            - TestNNInit::test_uniform
            - TestNNInit::test_xavier_normal
            - TestNNInit::test_xavier_normal_errors_on_inputs_smaller_than_2d
            - TestNNInit::test_xavier_uniform
            - TestNNInit::test_xavier_uniform_errors_on_inputs_smaller_than_2d
          mode: skip  # does not engage the torch-spyre layer

  global:
