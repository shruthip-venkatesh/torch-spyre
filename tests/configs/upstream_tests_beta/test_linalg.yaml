          mode: xfail  # xfail: NotImplementedError
        # These tests exercise the `addr` and `outer` operations across various dtypes, including unsupported ones like `bfloat16` and `int64`.
        # They are classified as `xfail` due to Spyre's current limitations in handling unsupported dtypes and type conversions during tensor operations.
        # Relevant Spyre limitations include lack of support for certain dtypes and type conversions during tensor copy operations.
        - names:
            - TestLinalg::test_addr_float_and_complex
            - TestLinalg::test_outer
          mode: xfail  # xfail: RuntimeError, torch._inductor.exc.InductorError
        # These tests exercise matrix multiplication (baddbmm) and triangular operations (triu/tril) with various dtypes.
        # They are classified as xfail due to missing support for 'aten::baddbmm.out' and 'aten::random_.from' in the Spyre backend.
        # Relevant Spyre limitations include incomplete operator coverage and missing 'dxp_standalone' file.
        - names:
            - TestLinalg::test_baddbmm
            - TestLinalg::test_triu_tril_extreme_k_values
          mode: xfail  # xfail: NotImplementedError, torch._inductor.exc.InductorError
        # These tests exercise various linear algebra operations and their error handling, including matrix operations, eigenvalue calculations, and tensor manipulations.
        # They are classified as xfail on the Spyre backend due to unsupported data types and memory alignment requirements.
        # The most relevant Spyre limitations include lack of support for complex and double data types, and strict memory alignment constraints.
        - names:
            - TestLinalg::test_dot_invalid_args
            - TestLinalg::test_eig_errors_and_warnings
            - TestLinalg::test_eigvals_errors_and_warnings
            - TestLinalg::test_einsum_corner_cases
