test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/test_linalg.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise matrix multiplication and related linear algebra operations with various tensor shapes and data types.
        # They are classified as mandatory_success on the Spyre backend because they are critical for verifying the correctness and performance of matrix operations.
        # The relevant Spyre capabilities include efficient handling of matrix multiplications and support for various tensor shapes and data types.
        - names:
            - TestLinalg::test__int_mm
            - TestLinalg::test__int_mm_errors
            - TestLinalg::test_cross_error
            - TestLinalg::test_eig_removed_error
            - TestLinalg::test_einsum_error_cases
            - TestLinalg::test_linear_algebra_scalar_raises
            - TestLinalg::test_lstsq_removed_error
            - TestLinalg::test_matrix_exp_backward_input_validation
            - TestLinalg::test_matrix_rank_removed_error
            - TestLinalg::test_ormqr_errors_and_warnings
            - TestLinalg::test_qr_error_cases
            - TestLinalg::test_solve_removed_error
            - TestLinalg::test_symeig_removed_error
          mode: mandatory_success
        # These tests exercise a wide range of linear algebra operations, including matrix multiplications, norms, and decompositions, across various data types and tensor shapes.
        # They are classified as xfail on the Spyre backend due to unsupported operations, data types, and tensor manipulations, as well as missing capabilities for handling certain error conditions and edge cases.
        # The most relevant Spyre limitations include unsupported batch matrix multiplications, specific data type promotions, and constraints on tensor layout transformations.
        - names:
            - TestLinalg::test_baddbmm_input_dtypes_compatibility
            - TestLinalg::test_outer_ger_addr_legacy_tests
            - TestLinalg::test_1_sized_with_0_strided
            - TestLinalg::test__int4_mm
            - TestLinalg::test_addbmm
            - TestLinalg::test_addmm
            - TestLinalg::test_addmm_baddbmm_overflow
            - TestLinalg::test_addmm_sizes
            - TestLinalg::test_addmv
            - TestLinalg::test_addr_type_promotion
            - TestLinalg::test_blas_empty
            - TestLinalg::test_bmm
            - TestLinalg::test_broadcast_batched_matmul
            - TestLinalg::test_broadcast_fused_matmul
            - TestLinalg::test_cholesky
            - TestLinalg::test_cholesky_ex
            - TestLinalg::test_cholesky_inverse
            - TestLinalg::test_cholesky_solve
            - TestLinalg::test_cholesky_solve_batched
