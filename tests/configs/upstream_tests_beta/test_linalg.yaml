            - TestLinalg::test_vector_norm_dim_tuple_arg
            - TestLinalg::test_vector_norm_extreme_values
            - TestLinalg::test__int_mm_cpu
          mode: xfail  # xfail: torch._inductor.exc.InductorError
        # These tests exercise a variety of linear algebra operations, including matrix multiplications, tensor manipulations, and eigenvalue calculations, across different data types and tensor shapes.
        # They are classified as xfail on the Spyre backend due to unsupported operations, missing features, or known issues with the backend's handling of certain data types and tensor operations.
        # Relevant Spyre capabilities include support for bfloat16, float16, and float32 data types, but limitations exist in handling complex numbers, certain tensor operations, and unsupported data types like float8_e4m3fnuz.
