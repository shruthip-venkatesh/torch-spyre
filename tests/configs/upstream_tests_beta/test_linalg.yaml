            - TestLinalg::test_pinverse
            - TestLinalg::test_vdot_invalid_args
          mode: xfail  # xfail: RuntimeError
        # These tests exercise the `matmul` operation with `torch.half` dtype on large tensors.
        # They are classified as `xfail` due to the Spyre backend not supporting CUDA compilation.
        # The relevant Spyre limitation is the lack of CUDA support for tensor operations.
        - names:
            - TestLinalg::test_matmul_45724
          mode: xfail  # xfail: AssertionError
        # These tests exercise the `torch.linalg.norm` operation with various error conditions and unsupported parameters.
        # They are classified as xfail due to the Spyre backend's inability to handle certain tensor dimensions and norm orders.
        # The relevant Spyre limitation is its support for only specific tensor dimensions and norm orders in `linalg.norm`.
        - names:
            - TestLinalg::test_norm_errors
          mode: xfail  # xfail: torch._dynamo.exc.TorchRuntimeError
        # These tests exercise type promotion in outer product operations across various dtypes.
        # They are classified as xfail due to Spyre's lack of support for type conversion during tensor operations.
        # Relevant Spyre limitations include unsupported type conversions and missing dtype support for certain ops.
        - names:
            - TestLinalg::test_outer_type_promotion
          mode: xfail  # xfail: RuntimeError
        # These tests exercise various linear algebra operations, including matrix multiplications, singular value decompositions, and triangular solves, across different data types.
