            - TestLinalg::test_inner
            - TestLinalg::test_kron
            - TestLinalg::test_ldl_factor
            - TestLinalg::test_ldl_solve
            - TestLinalg::test_linalg_matrix_exp_batch
            - TestLinalg::test_matrix_norm
            - TestLinalg::test_norm_bfloat16_and_half
            - TestLinalg::test_norm_dtype
            - TestLinalg::test_norm_extreme_values
            - TestLinalg::test_norm_fastpaths
            - TestLinalg::test_norm_fro_2_equivalence_old
            - TestLinalg::test_norm_fused_type_promotion
            - TestLinalg::test_norm_matrix
            - TestLinalg::test_norm_old
            - TestLinalg::test_norm_old_nan_propagation
            - TestLinalg::test_norm_vector
            - TestLinalg::test_powsum
            - TestLinalg::test_powsum_dtype_kwarg
            - TestLinalg::test_powsum_dtype_kwarg_1d_reduction
