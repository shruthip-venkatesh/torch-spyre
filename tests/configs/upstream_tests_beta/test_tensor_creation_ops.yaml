test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/test_tensor_creation_ops.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise tensor creation and manipulation operations across various dtypes and tensor behaviors.
        # They are classified as mandatory_success because they validate core functionalities essential for tensor operations on the Spyre backend.
        # Relevant Spyre capabilities include support for bfloat16, bool, float16, float32, and int64 dtypes, and operations like cat, clone, and new_empty_strided.
        - names:
            - TestAsArray::test_copy_list
            - TestAsArray::test_unsupported_alias
            - TestRandomTensorCreation::test_normal_std_error
            - TestTensorCreation::test_arange_device_vs_cpu
            - TestTensorCreation::test_as_strided_neg
            - TestTensorCreation::test_cat_mem_overlap
            - TestTensorCreation::test_cat_stack_cross_devices
            - TestTensorCreation::test_empty_strided
            - TestTensorCreation::test_empty_tensor_props
            - TestTensorCreation::test_linlogspace_mem_overlap
            - TestTensorCreation::test_new_empty_strided
            - TestTensorCreation::test_offset_scalar_cast
            - TestTensorCreation::test_simple_scalar_cast
            - TestTensorCreation::test_storage_filename
            - TestTensorCreation::test_strided_mismatched_stride_shape
            - TestTensorCreation::test_torch_complex_floating_dtype_error
            - TestTensorCreation::test_torch_complex_out_dtype_error
            - TestTensorCreation::test_unpack_double
            - TestTensorCreation::test_vander
            - TestTensorCreation::test_zeros_dtype_layout_device_match
          mode: mandatory_success
        # These tests exercise the `dsplit` operation with different dtypes, focusing on tensor splitting behaviors.
        # They are classified as `mandatory_success` because the Spyre backend must support `dsplit` for all relevant dtypes.
        # The relevant Spyre capability is the exclusion of `int64` dtype due to backend limitations.
        - names:
            - TestTensorCreation::test_dsplit
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: int64
        # These tests verify the behavior of float-to-int conversion, including handling of non-finite values.
        # They are classified as mandatory_success due to the expected NotImplementedError and TypeError.
        # The failure with int64 dtype highlights Spyre's current limitation in handling this specific conversion.
        - names:
            - TestTensorCreation::test_float_to_int_conversion_nonfinite
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: int64
        # These tests exercise the `hsplit` operation with different dtypes, focusing on tensor splitting behaviors.
        # They are classified as `mandatory_success` due to the expectation that `hsplit` should work across supported dtypes.
        # The relevant Spyre capability is its support for tensor operations, but it currently lacks support for `int64` dtypes.
        - names:
            - TestTensorCreation::test_hsplit
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: int64
        # These tests exercise the `vsplit` operation with different dtypes, focusing on tensor splitting behaviors.
        # They are classified as `mandatory_success` due to the expectation that all supported dtypes should pass.
        # The relevant Spyre limitation is the lack of support for `int64` dtype, causing `NotImplementedError`.
        - names:
            - TestTensorCreation::test_vsplit
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: int64
        - names:
            - TestTensorCreation::test_cat_trailing_dim
            - TestAsArray::test_retain_autograd_history
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: bfloat16
                - name: bool
                - name: float16
                - name: int64
        # These tests exercise tensor aliasing and copying from buffer and numpy sources across various dtypes.
        # They are classified as xfail due to Spyre's lack of support for direct tensor-to-numpy conversion and missing 'aten::random_.from' op.
        # Relevant Spyre limitations include unsupported dtype conversions and missing operators for tensor manipulation.
        - names:
            - TestAsArray::test_alias_from_buffer
            - TestAsArray::test_alias_from_numpy
            - TestAsArray::test_copy_from_buffer
            - TestAsArray::test_copy_from_numpy
            - TestBufferProtocol::test_non_writable_buffer
          mode: xfail  # xfail: NotImplementedError, TypeError
        # # These tests exercise the `aten::random_.from` operator with various dtypes, including bfloat16 and int64.
        # # They are classified as xfail due to the Spyre backend not supporting the `aten::random_.from` operator.
        # # The primary limitation is the lack of support for this operator in the Spyre backend.
        # - names:
        #     - TestAsArray::test_alias_from_dlpack
        #   mode: xfail  # xfail: NotImplementedError
        # These tests exercise tensor aliasing and DLPack tensor conversion across various dtypes.
        # They are classified as xfail due to missing support for 'aten::random_.from' and incorrect SpyreTensorLayout.
        # Relevant Spyre limitations include incomplete operator coverage and tensor layout validation.
        - names:
            - TestAsArray::test_alias_from_tensor
            - TestAsArray::test_copy_from_dlpack
          mode: xfail  # xfail: NotImplementedError, RuntimeError
        # These tests exercise tensor copying operations across various dtypes, including unsupported ones like bfloat16 and bool.
        # They are classified as xfail due to Spyre's lack of support for certain dtypes and operators, such as 'aten::random_.from'.
        # Relevant Spyre limitations include missing support for specific dtypes and operators, leading to NotImplementedError and InductorError.
        - names:
            - TestAsArray::test_copy_tensor
          mode: xfail  # xfail: NotImplementedError, torch._inductor.exc.InductorError
        # These tests exercise tensor creation and manipulation operations across various dtypes and memory formats.
        # They are classified as xfail due to unsupported dtypes (Double, ComplexHalf, ComplexFloat) and memory formats (ChannelsLast).
        # Relevant Spyre limitations include incomplete dtype support and restricted memory format handling.
        - names:
            - TestAsArray::test_default_device
            - TestLikeTensorCreation::test_full_like_inference
            - TestLikeTensorCreation::test_ones_like
            - TestLikeTensorCreation::test_zeros_like
            - TestRandomTensorCreation::test_random_neg_values
            - TestTensorCreation::test_arange_lowp
            - TestTensorCreation::test_cat_out_memory_format
            - TestTensorCreation::test_combinations
            - TestTensorCreation::test_complex_type_conversions
            - TestTensorCreation::test_ctor_with_numpy_array
            - TestTensorCreation::test_fill_all_dtypes_and_devices
            - TestTensorCreation::test_from_file
            - TestTensorCreation::test_refs_tensor
            - TestTensorCreation::test_tensor_from_sequence
            - TestTensorCreation::test_torch_complex
            - TestTensorCreation::test_torch_polar
          mode: xfail  # xfail: RuntimeError
        # These tests exercise various tensor creation and manipulation operations, including concatenation, stacking, and random tensor generation.
        # They are classified as xfail due to unsupported operations and data types, as well as missing dependencies like 'dxp_standalone'.
        # Relevant Spyre limitations include unsupported stick expressions, data formats, and missing executable files.
        - names:
            - TestRandomTensorCreation::test_normal
            - TestTensorCreation::test_block_diag
            - TestTensorCreation::test_cartesian_prod
            - TestTensorCreation::test_cat
            - TestTensorCreation::test_cat_all_dtypes_and_devices
            - TestTensorCreation::test_cat_empty
            - TestTensorCreation::test_cat_empty_legacy
            - TestTensorCreation::test_cat_in_channels_last
            - TestTensorCreation::test_cat_misaligned
            - TestTensorCreation::test_cat_multi_batch
            - TestTensorCreation::test_cat_out
            - TestTensorCreation::test_cat_preserve_channels_last
            - TestTensorCreation::test_cat_size1
            - TestTensorCreation::test_diag_embed
            - TestTensorCreation::test_diagflat
            - TestTensorCreation::test_dstack
            - TestTensorCreation::test_hstack_column_stack
            - TestTensorCreation::test_vander_types
            - TestTensorCreation::test_vstack_row_stack
          mode: xfail  # xfail: torch._inductor.exc.InductorError
        # These tests exercise the buffer protocol with various dtypes, including bool, float16, float32, and int64.
        # They are classified as xfail due to NotImplementedError and TorchRuntimeError, indicating missing or unsupported ops.
        # The relevant Spyre limitations include lack of support for 'aten::random_.from' and fake tensor operations.
        - names:
            - TestBufferProtocol::test_shared_buffer
          mode: xfail  # xfail: NotImplementedError, torch._dynamo.exc.TorchRuntimeError
        # These tests exercise various tensor creation and manipulation operations, including random number generation, concatenation, and tensor shape operations.
        # They are classified as xfail on the Spyre backend due to missing or unimplemented operators, such as `resize_`, `random_`, and `linspace.out`.
        # The most relevant Spyre limitations include the lack of support for certain tensor operations and the need for additional hooks to be registered and implemented.
        - names:
            - TestTensorCreation::test_meshgrid_vs_numpy
            - TestLikeTensorCreation::test_rand_like
            - TestLikeTensorCreation::test_randint_like
            - TestLikeTensorCreation::test_randn_like
            - TestRandomTensorCreation::test_rand
            - TestRandomTensorCreation::test_randint_distribution
            - TestRandomTensorCreation::test_randn
            - TestTensorCreation::test_cat2
            - TestTensorCreation::test_device_rounding
            - TestTensorCreation::test_eye
            - TestTensorCreation::test_full_out
            - TestTensorCreation::test_large_linspace
            - TestTensorCreation::test_linspace
            - TestTensorCreation::test_linspace_deduction
            - TestTensorCreation::test_linspace_vs_numpy
            - TestTensorCreation::test_logspace
            - TestTensorCreation::test_logspace_base2
            - TestTensorCreation::test_logspace_deduction
            - TestTensorCreation::test_logspace_vs_numpy
            - TestTensorCreation::test_meshgrid_default_indexing
            - TestTensorCreation::test_meshgrid_ij_indexing
            - TestTensorCreation::test_meshgrid_xy_indexing
            - TestTensorCreation::test_new_methods_requires_grad
            - TestTensorCreation::test_ones
            - TestTensorCreation::test_random
            - TestTensorCreation::test_random_bool
            - TestTensorCreation::test_random_default
            - TestTensorCreation::test_random_from_to
            - TestTensorCreation::test_random_from_to_bool
            - TestTensorCreation::test_random_full_range
            - TestTensorCreation::test_random_to
            - TestTensorCreation::test_range
            - TestTensorCreation::test_range_warning
            - TestTensorCreation::test_repeat_interleave
            - TestTensorCreation::test_roll
            - TestTensorCreation::test_stack
            - TestTensorCreation::test_stack_out
            - TestTensorCreation::test_tensor_factories_empty
            - TestTensorCreation::test_zeros
            - TestTensorCreation::test_zeros_out
          mode: xfail  # xfail: NotImplementedError
        # These tests exercise tensor creation and manipulation operations, including random number generation, concatenation, and type conversion.
        # They are classified as xfail due to unsupported data types (e.g., bfloat16, float16) and memory formats (e.g., ChannelsLast) on the Spyre backend.
        # Relevant Spyre limitations include lack of support for certain dtypes and memory formats, as well as missing ops like dxp_standalone.
        - names:
            - TestRandomTensorCreation::test_uniform_from_to
            - TestTensorCreation::test_cat_channels_last_large_inputs
            - TestTensorCreation::test_cat_out_fast_path_dim0_dim1
            - TestTensorCreation::test_float_to_int_conversion_finite
