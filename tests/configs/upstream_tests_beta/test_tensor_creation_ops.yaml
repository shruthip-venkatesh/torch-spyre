            - TestTensorCreation::test_logspace_device_vs_cpu
            - TestTensorCreation::test_logspace_special_steps
            - TestTensorCreation::test_meshgrid_ij_indexing_is_default
            - TestTensorCreation::test_tensor_ctor_device_inference
            - TestTensorCreation::test_torch_complex_same_dtype_error
          mode: xfail   # xfail: dxp_standalone not detected
        # # These tests exercise the `meshgrid` operation with various indexing options and tensor shapes.
        # # They are classified as xfail due to multiple sub-assertion failures in comparing PyTorch and NumPy results.
        # # The relevant Spyre capability is the `meshgrid` operation, which currently fails to match NumPy's behavior.
        # - names:
        #     - TestTensorCreation::test_meshgrid_vs_numpy
        #   mode: xfail  # xfail: SubtestFailure
        # These tests verify tensor creation on the 'privateuse1' device, expecting 'cuda' behavior.
        # They are classified as xfail due to an AssertionError mismatching device types.
        # Relevant Spyre limitations include device type handling and dtype downcasting warnings.
        - names:
            - TestTensorCreation::test_new_tensor_device
          mode: xfail  # xfail: AssertionError
        # These tests exercise various tensor creation and manipulation operations, including tensor copying, device handling, and dtype inference.
        # They are classified as "skip" on the Spyre backend due to unsupported CUDA operations and missing CUDA library dependencies.
        # Relevant Spyre limitations include lack of CUDA support and unsupported dtypes like bfloat16 and float16 for certain operations.
        - names:
