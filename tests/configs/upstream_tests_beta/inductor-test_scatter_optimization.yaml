test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/inductor/test_scatter_optimization.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise various scatter operations, including handling of different tensor dimensions and index tensors.
        # They are classified as mandatory_success because the Spyre backend fully supports scatter operations across all relevant dtypes.
        # The relevant Spyre capabilities include efficient handling of scatter operations and support for all required tensor dimensions and index types.
        - names:
            - TestScatterOpt::test_3d_tensor
          mode: mandatory_success
        - names:
            - TestScatterOpt::test_cross_entropy_loss
          mode: xfail
        - names:
            - TestScatterOpt::test_can_not_optimize_due_to_dense
            - TestScatterOpt::test_can_not_optimize_due_to_non_const
            - TestScatterOpt::test_cross_entropy_loss
            - TestScatterOpt::test_neg_scatter_dim
            - TestScatterOpt::test_non_last_dim
            - TestScatterOpt::test_nonzero_const_tensor
            - TestScatterOpt::test_shorter_index_tensor
          mode: skip
  global:
    supported_dtypes:
      - name: bfloat16
      - name: bool
      - name: float16
      - name: float32
      - name: int64
