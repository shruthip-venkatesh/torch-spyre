test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/nn/test_lazy_modules.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise the `materialize` method on lazy modules, which is essential for initializing parameters on the device.
        # The tests are classified as xfail due to the missing `materialize` attribute in the Spyre backend.
        # This failure highlights a limitation in Spyre's support for lazy module initialization.
        - names:
            - TestLazyModules::test_materialize_device
          mode: xfail  # xfail: AttributeError
        # These tests exercise various lazy initialization and state management functionalities in PyTorch modules, including batch normalization, convolution, instance normalization, and linear layers.
        # They are classified as 'skip' on the Spyre backend because the tests do not specify a device argument, which is required for proper execution on the Spyre device.
        # The most relevant Spyre capabilities are the support for various dtypes and ops, but the tests' lack of device specification prevents them from being executed on the Spyre device.
        - names:
            - TestLazyModules::test_chained_initialization
            - TestLazyModules::test_invalid_functions
            - TestLazyModules::test_lazy_batchnorm1d
            - TestLazyModules::test_lazy_batchnorm1d_pickle
            - TestLazyModules::test_lazy_batchnorm1d_state
            - TestLazyModules::test_lazy_batchnorm2d
            - TestLazyModules::test_lazy_batchnorm2d_pickle
            - TestLazyModules::test_lazy_batchnorm2d_state
            - TestLazyModules::test_lazy_batchnorm3d
            - TestLazyModules::test_lazy_batchnorm3d_pickle
            - TestLazyModules::test_lazy_batchnorm3d_state
            - TestLazyModules::test_lazy_batchnorm_with_dict_input
            - TestLazyModules::test_lazy_conv1d
            - TestLazyModules::test_lazy_conv1d_pickle
            - TestLazyModules::test_lazy_conv1d_state
            - TestLazyModules::test_lazy_conv2d
            - TestLazyModules::test_lazy_conv2d_pickle
            - TestLazyModules::test_lazy_conv2d_state
            - TestLazyModules::test_lazy_conv3d
            - TestLazyModules::test_lazy_conv3d_pickle
            - TestLazyModules::test_lazy_conv3d_state
            - TestLazyModules::test_lazy_conv_transpose1d_kwargs
            - TestLazyModules::test_lazy_conv_transpose1d_pickle
            - TestLazyModules::test_lazy_conv_transpose1d_state
            - TestLazyModules::test_lazy_conv_transpose2d
            - TestLazyModules::test_lazy_conv_transpose2d_kwargs
            - TestLazyModules::test_lazy_conv_transpose2d_pickle
            - TestLazyModules::test_lazy_conv_transpose2d_state
            - TestLazyModules::test_lazy_conv_transpose3d
            - TestLazyModules::test_lazy_conv_transpose3d_kwargs
            - TestLazyModules::test_lazy_conv_transpose3d_pickle
            - TestLazyModules::test_lazy_conv_transpose3d_state
            - TestLazyModules::test_lazy_conv_transposed1d
            - TestLazyModules::test_lazy_forward_hook
            - TestLazyModules::test_lazy_instancenorm1d
            - TestLazyModules::test_lazy_instancenorm1d_pickle
            - TestLazyModules::test_lazy_instancenorm1d_state
            - TestLazyModules::test_lazy_instancenorm2d
            - TestLazyModules::test_lazy_instancenorm2d_pickle
            - TestLazyModules::test_lazy_instancenorm2d_state
            - TestLazyModules::test_lazy_instancenorm3d
            - TestLazyModules::test_lazy_instancenorm3d_pickle
            - TestLazyModules::test_lazy_instancenorm3d_state
            - TestLazyModules::test_lazy_linear_pickle
            - TestLazyModules::test_lazy_linear_state_and_forward
            - TestLazyModules::test_lazy_module_buffer
            - TestLazyModules::test_lazy_module_jit_buffer
            - TestLazyModules::test_lazy_module_jit_param
