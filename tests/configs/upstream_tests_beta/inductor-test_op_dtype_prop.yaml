test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/inductor/test_op_dtype_prop.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise basic tensor operations and constant handling in PyTorch.
        # They are classified as xfail due to the RuntimeError caused by lack of CUDA support.
        # The Spyre backend's limitation in handling CUDA-specific operations is the key issue.
        - names:
            - TestCase::test_constant
          mode: xfail  # xfail: RuntimeError
        # These tests exercise various operations and data types, including mixed precision and dtype-aware codegen.
        # They are classified as 'skip' because they do not engage the torch-spyre layer, primarily due to CUDA dependency.
        # The relevant Spyre limitation is the lack of CUDA support, which is required for these tests to execute properly.
        - names:
            - TestCase::test_any
            - TestCase::test_assoc_scan
            - TestCase::test_binary_math_mixed_precision
            - TestCase::test_codegen_upcast_to_fp32
            - TestCase::test_downcast_div_mod
            - TestCase::test_dtype_aware_codegen
            - TestCase::test_op_dtype_propagation
            - TestCase::test_op_dtype_support
            - TestCase::test_unbacked_float_uses_fp64_signature
            - TestCase::test_upcast_rank_0_cpu
          mode: skip  # does not engage the torch-spyre layer

  global:
    supported_dtypes:
      - name: bfloat16
      - name: bool
      - name: float16
      - name: float32
      - name: int64
    supported_ops:
