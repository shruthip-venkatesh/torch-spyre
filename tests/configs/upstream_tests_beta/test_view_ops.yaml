test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/test_view_ops.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise view and shape operations like as_strided, broadcast_tensors, and reshape on empty and non-empty tensors.
        # They are mandatory_success because Spyre fully supports these basic tensor metadata manipulations and error checks.
        # Spyre's layout handling and dtype support for bfloat16, float16, float32, and int64 enable these passes.
        - names:
            - TestOldViewOps::test_as_strided_overflow_storage_offset
            - TestOldViewOps::test_broadcast_tensors
            - TestOldViewOps::test_contiguous
            - TestOldViewOps::test_empty_reshape
            - TestOldViewOps::test_tensor_split_errors
            - TestOldViewOps::test_view_empty
            - TestViewOps::test_conj_self
            - TestViewOps::test_contiguous_self
          mode: mandatory_success
        # These tests exercise the broadcast_to operation across various tensor shapes and dtypes.
        # They are mandatory_success because Spyre supports broadcast_to for float16 and float32 dtypes.
        # The failures for bool and int64 are due to missing support for the aten::random_.from op used in test setup.
        - names:
            - TestOldViewOps::test_broadcast_to
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: bool
                - name: int64
        # These tests exercise tensor_split with various indices, dimensions, and tensor shapes.
        # They are mandatory_success because Spyre supports tensor_split for float16 and float32 dtypes.
        # The failures for bool and int64 are due to missing support for aten::random_.from during tensor creation.
        - names:
            - TestOldViewOps::test_tensor_split_indices
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: bool
                - name: int64
        # These tests exercise tensor_split with sections across various tensor sizes and dimensions.
        # They are mandatory_success because Spyre supports the core view operation but lacks random_ for bool/int64 initialization.
        # The failures are due to missing aten::random_.from for bool and int64 dtypes during tensor creation.
        - names:
            - TestOldViewOps::test_tensor_split_sections
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: bool
                - name: int64
        # These tests exercise matrix transpose operations (H, mT, mH, adjoint) and error handling for invalid tensor shapes.
        # They are mandatory_success because Spyre supports the required view operations for all relevant dtypes.
        # The failures for bool and int64 are due to Spyre's lack of support for the aten::random_.from operator used in test setup.
        - names:
            - TestOldViewOps::test_transposes_errors
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: bool
                - name: int64
        # These tests verify that torch.imag raises a RuntimeError for non-complex dtypes like float16, float32, bfloat16, and int64.
        # The mandatory_success classification excludes float16 and float32 due to a missing dxp_standalone toolchain error during compilation.
        # The failures are unrelated to the op's correctness but stem from a backend tooling issue for those specific dtypes.
        - names:
            - TestViewOps::test_imag_noncomplex
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: float16
                - name: float32
        # These tests exercise view operations with dtype upsize errors for various data types.
        # They are mandatory_success because Spyre lacks aten::random_.from for bool and int64 dtypes.
        # The failures highlight missing random tensor generation support for those dtypes on Spyre.
        - names:
            - TestViewOps::test_view_dtype_upsize_errors
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: bool
                - name: int64
        # These tests exercise tensor_split view operations on tensors of various dtypes.
        # They are mandatory_success because Spyre lacks the aten::random_.from operator for bool and int64 dtypes.
        # The backend supports tensor_split for bfloat16, float16, and float32 but not the random initialization for excluded types.
        - names:
            - TestViewOps::test_view_tensor_split
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: bool
                - name: int64
        # These tests exercise view operations like T, flatten, reshape, and view across various dtypes and memory formats.
        # They are xfailed due to missing Spyre support for double, complex, and non-contiguous memory formats.
        # The failures highlight Spyre's limited dtype support and its restriction to contiguous memory layouts only.
        - names:
            - TestOldViewOps::test_T
            - TestOldViewOps::test_flatten
            - TestOldViewOps::test_memory_format_resize_as
            - TestOldViewOps::test_python_types
            - TestOldViewOps::test_reshape
            - TestOldViewOps::test_view_all_dtypes_and_devices
            - TestViewOps::test_conj_view_with_shared_memory
            - TestViewOps::test_view_copy_output_contiguous
          mode: xfail  # xfail: RuntimeError
        # These tests exercise view operations like atleast, reshape, transpose, and split across various dtypes.
        # They are xfailed due to missing Spyre support for aten::random_.from and restickify mutations during view operations.
        # The failures highlight Spyre's lack of random tensor initialization and limited view mutation capabilities.
        - names:
            - TestOldViewOps::test_atleast
            - TestOldViewOps::test_reshape_view_semantics
            - TestOldViewOps::test_transpose_invalid
            - TestOldViewOps::test_transpose_vs_numpy
            - TestViewOps::test_view_tensor_dsplit
            - TestViewOps::test_view_tensor_hsplit
            - TestViewOps::test_view_tensor_vsplit
          mode: xfail  # xfail: NotImplementedError, torch._inductor.exc.InductorError
        # These tests exercise view operations like transpose, reshape, flatten, and indexing that create tensor aliases.
        # They are xfailed because Spyre's stickified layout system cannot restickify tensors after mutation or handle complex stride expressions.
        # The failures highlight missing restickify support for layout changes and unsupported stride patterns like 2*d0.
        - names:
            - TestOldViewOps::test_big_transpose
            - TestOldViewOps::test_ravel
            - TestViewOps::test_T_view
            - TestViewOps::test_as_strided_inplace_view
            - TestViewOps::test_as_strided_view
            - TestViewOps::test_basic_indexing_ellipses_view
            - TestViewOps::test_basic_indexing_newaxis_view
            - TestViewOps::test_basic_indexing_slice_view
            - TestViewOps::test_chunk_view
            - TestViewOps::test_contiguous_nonview
            - TestViewOps::test_diagonal_view
            - TestViewOps::test_expand_as_view
            - TestViewOps::test_expand_view
            - TestViewOps::test_flatten_nonview
            - TestViewOps::test_flatten_view
            - TestViewOps::test_maybe_view_chunk_cat
            - TestViewOps::test_movedim_view
            - TestViewOps::test_narrow_view
            - TestViewOps::test_permute_view
            - TestViewOps::test_reshape_as_view
            - TestViewOps::test_reshape_nonview
            - TestViewOps::test_reshape_view
            - TestViewOps::test_select_view
            - TestViewOps::test_split_view
            - TestViewOps::test_squeeze_inplace_view
            - TestViewOps::test_squeeze_view
            - TestViewOps::test_t_inplace_view
            - TestViewOps::test_t_view
            - TestViewOps::test_transpose_inplace_view
            - TestViewOps::test_transpose_view
            - TestViewOps::test_unbind_view
            - TestViewOps::test_unsqueeze_inplace_view
            - TestViewOps::test_unsqueeze_view
            - TestViewOps::test_view_as_view
            - TestViewOps::test_view_copy
            - TestViewOps::test_view_copy_out
            - TestViewOps::test_view_view
          mode: xfail  # xfail: torch._inductor.exc.InductorError
        # These tests exercise view and in-place operations like expand, resize_, unfold, and advanced indexing.
        # They are xfail due to missing Spyre kernel implementations for aten::unfold, aten::resize_, and aten::index.
        # Spyre currently lacks support for many view-related operators and in-place shape modifications.
        - names:
            - TestOldViewOps::test_expand
            - TestOldViewOps::test_memory_format_resize_
            - TestOldViewOps::test_resize_all_dtypes_and_devices
            - TestViewOps::test_advanced_indexing_assignment
            - TestViewOps::test_advanced_indexing_nonview
            - TestViewOps::test_unfold_view
          mode: xfail  # xfail: NotImplementedError
        # These tests exercise view and resize operations across all dtypes, including complex.
        # They are xfail due to missing support for view operations and in-place resizing on Spyre.
        # Spyre currently lacks capabilities for complex dtypes and view-based tensor manipulations.
        - names:
            - TestOldViewOps::test_resize_as_all_dtypes_and_devices
          mode: xfail   # xfail: dxp_standalone not detected
        # These tests exercise tensor transpose operations like T, H, mT, mH, and adjoint across multiple dtypes. They are xfail due to missing support for the aten::random_.from operator needed for tensor initialization. The Spyre backend currently lacks random tensor generation capabilities required by the test's make_tensor function.
        - names:
            - TestOldViewOps::test_transposes
          mode: xfail  # xfail: NotImplementedError, RuntimeError
        # These tests exercise view operations with dtype changes across bool, float16, int64, and float32.
        # They are xfail due to missing support for the aten::random_.from operator on Spyre.
        # The failures highlight Spyre's lack of random tensor generation for test input creation.
        # - names:
        #     - TestViewOps::test_view_dtype_new
        #   mode: xfail  # xfail: NotImplementedError
        # These tests exercise view operations like chunk, narrow, split, unsqueeze, and as_strided gradients.
        # They are classified as skip because they do not engage the torch-spyre layer and run on CPU.
        # Spyre's view operation support is limited, and these tests rely on CPU-only tensor manipulations.
        - names:
            - TestOldViewOps::test_view
            - TestViewOps::test_view_dtype_new
            - TestViewOps::test_view_as_complex
            - TestOldViewOps::test_atleast_gradient
            - TestOldViewOps::test_broadcast_shapes
            - TestOldViewOps::test_chunk
            - TestOldViewOps::test_conj_neg_view_numpy_error
            - TestOldViewOps::test_crow_col_indices
            - TestOldViewOps::test_narrow
            - TestOldViewOps::test_narrow_tensor
            - TestOldViewOps::test_resize_as_preserves_strides
            - TestOldViewOps::test_resize_overflow
            - TestOldViewOps::test_split
            - TestOldViewOps::test_t
            - TestOldViewOps::test_unsqueeze
            - TestViewOps::test_as_strided_gradients
            - TestViewOps::test_unbind
          mode: skip  # does not engage the torch-spyre layer

