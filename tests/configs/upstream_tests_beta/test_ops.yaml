        #         - name: int64
        #         - name: bool
        # These tests exercise pointwise operations on tensors, including addition, multiplication, and logical operations.
        # They are classified as mandatory_success because the Spyre backend must support these fundamental operations.
        # The relevant Spyre limitations include unsupported dtypes (float16, float32) and specific ops (cat, clamp, where).
