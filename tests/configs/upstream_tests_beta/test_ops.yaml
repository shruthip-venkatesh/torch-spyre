test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/test_ops.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise sparse operations and Python reference errors, focusing on unsupported dtypes and tensor rank limitations.
        # They are classified as mandatory_success because they must pass to ensure compatibility with the Spyre backend.
        # Relevant Spyre limitations include unsupported dtypes like Double and tensor ranks exceeding 65.
        - names:
            - TestCommon::test_errors_sparse
            - TestCommon::test_python_ref_errors
            - TestCommon::test_meta_consistency_out_dtype_mismatch # excludes not working
            - TestCommon::test_out_requires_grad_error # excludes not working
            - TestCompositeCompliance::test_cow_input # excludes not working
            - TestCompositeCompliance::test_view_replay # excludes not working
            - TestFakeTensor::test_fake # excludes not working
            - TestFakeTensor::test_fake_autocast # excludes not working
            - TestFakeTensor::test_pointwise_ops # excludes not working
            - TestCommon::test_errors_sparse # excludes not working
            - TestTags::test_tags # excludes not working 
          mode: xfail
        # These tests exercise operations like `add`, `addmm`, `bmm`, and `clamp` with various dtypes including `bool`, `int64`, and `float16`.
        # They are classified as `mandatory_success` because the Spyre backend must support these operations for full compatibility.
        # The most relevant Spyre limitations are the lack of support for `requires_grad=True` with boolean and integral dtypes, and errors related to missing files or unsupported operators.
        # - names:
        #     - TestCompositeCompliance::test_cow_input # excludes not working
        #   mode: mandatory_success
        #   edits:
        #     ops:
        #       exclude:
        #         - name: add
        #         - name: addmm
        #         - name: bitwise_and
