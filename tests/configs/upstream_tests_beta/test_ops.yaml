        # These tests exercise various tensor operations (ops) and data types (dtypes) to verify compatibility with the Spyre backend.
        # They are classified as mandatory_success because the Spyre backend must support these operations for basic functionality.
        # Relevant Spyre limitations include unsupported memory formats and missing implementations for certain ops like 'cat', 'clamp', and 'where'.
        # - names:
        #     - TestFakeTensor::test_fake # excludes not working
        #   mode: mandatory_success
        #   edits:
        #     ops:
        #       exclude:
        #         - name: cat
        #         - name: clamp
        #         - name: where
        #     dtypes:
        #       exclude:
        #         - name: bfloat16
        #         - name: int64
        #         - name: bool
        # These tests exercise autocasting behavior with various ops and dtypes, focusing on tensor operations.
        # They are classified as mandatory_success due to Spyre's strict memory format requirements and limited operator support.
        # Relevant Spyre limitations include unsupported 'cat', 'clamp', and 'where' ops, and restricted dtype support for 'float16' and 'float32'.
        # - names:
        #     - TestFakeTensor::test_fake_autocast # excludes not working
        #   mode: mandatory_success
        #   edits:
        #     ops:
