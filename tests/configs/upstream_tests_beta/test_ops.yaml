        #         - name: mean
        #         - name: minimum
        #         - name: mm
        #         - name: mul
        #         - name: new_ones
        #         - name: sign
        #         - name: sub
        #         - name: topk
        #         - name: where
        #     dtypes:
        #       exclude:
        #         - name: bool
        #         - name: float32
        # These tests exercise tensor view operations and metadata consistency across various ops and dtypes.
        # They are classified as mandatory_success due to the critical nature of view operations in tensor manipulation.
        # Spyre's limitations in handling certain ops and dtypes, such as unsupported random ops and dtype conversions, are relevant.
        # - names:
        #     - TestCompositeCompliance::test_view_replay # excludes not working
        #   mode: mandatory_success
        #   edits:
        #     ops:
        #       exclude:
        #         - name: add
