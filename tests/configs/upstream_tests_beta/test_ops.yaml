        # These tests exercise a variety of operations and data types, including unsupported bitwise and reduction ops.
        # They are classified as mandatory_success due to Spyre's limitations in handling certain operations and data types.
        # Relevant Spyre limitations include unsupported ops like bitwise_and and topk, and memory format constraints.
