        #         - name: int64
        #         - name: bool
        # These tests exercise the `full` and `ones` ops with various dtypes, focusing on tensor layout conversion to strided.
        # They are classified as mandatory_success due to Spyre's support for strided layout conversion with most dtypes.
        # Relevant Spyre limitations include unsupported type conversions during copy and missing `dxp_standalone` for float16 ops.
        # - names:
        #     - TestFakeTensor::test_strided_layout # excludes not working
