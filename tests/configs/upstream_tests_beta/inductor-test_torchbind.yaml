test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/inductor/test_torchbind.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise torchbind functionality, including dynamic shape handling with SymInt.
        # They are classified as mandatory_success because they do not engage the torch-spyre layer.
        # Relevant Spyre limitations include missing support for dynamic shape operators and certain ops.
        - names:
            - TestTorchbind::test_torchbind_compile
          mode: mandatory_success
        # These tests verify that TorchBind custom C++ objects work correctly with TorchInductor and AOTInductor compilation pipelines.
        # They ensure proper handling of compilation, execution, dynamic shapes, tracing, schema generation, and graph optimizations.
        # The suite also validates runtime infrastructure features such as namespace resolution, memory tracking, code generation, and queue-based operations.
        # Relevant Spyre capabilities include support for various dtypes and ops, but these tests do not leverage them directly.
        - names:
            - TestTorchbind::test_torchbind_compile_symint
            - TestTorchbind::test_aoti_torchbind_name_collision
            - TestTorchbind::test_torchbind_aot_compile
            - TestTorchbind::test_torchbind_aot_compile_constant_folding
            - TestTorchbind::test_torchbind_aoti
            - TestTorchbind::test_torchbind_compile_gpu_op_symint_graph_partition
            - TestTorchbind::test_torchbind_config_not_generated
            - TestTorchbind::test_torchbind_get_buf_bytes
            - TestTorchbind::test_torchbind_hop_schema
            - TestTorchbind::test_torchbind_hop_schema_no_input
            - TestTorchbind::test_torchbind_hop_schema_no_output
            - TestTorchbind::test_torchbind_inductor
            - TestTorchbind::test_torchbind_input_aot_compile
            - TestTorchbind::test_torchbind_list_return_aot_compile
            - TestTorchbind::test_torchbind_queue
          mode: skip  # does not engage the torch-spyre layer

  global:
    supported_dtypes:
      - name: bfloat16
      - name: bool
      - name: float16
      - name: float32
      - name: int64
