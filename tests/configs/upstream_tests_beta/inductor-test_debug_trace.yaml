test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/inductor/test_debug_trace.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise debug printing and tracing functionalities that do not involve tensor operations or data types.
        # They are classified as mandatory_success because they do not interact with the torch-spyre layer, focusing on PyTorch internals.
        # Relevant Spyre capabilities include support for various dtypes and ops, but these tests do not leverage those features directly.
        - names:
            - _cls_TestDebugTrace::test_debug_printer_const
          mode: mandatory_success
        # These tests exercise debug trace functionalities and do not involve any specific ops or dtypes.
        # They are classified as 'skip' because they do not interact with the torch-spyre layer, focusing on PyTorch internals.
        # The relevance to Spyre is minimal, as these tests do not leverage any Spyre-specific capabilities or limitations.
        - names:
            - TestDebugTrace::test_debug_multi_tempalte
            - TestDebugTrace::test_debug_printer_const
            - TestDebugTrace::test_debug_trace
            - _cls_TestDebugTrace::test_debug_multi_tempalte
            - _cls_TestDebugTrace::test_debug_trace
          mode: skip  # does not engage the torch-spyre layer

  global:
