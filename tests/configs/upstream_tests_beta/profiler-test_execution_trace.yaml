test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/profiler/test_execution_trace.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise the execution trace functionality with nested tensors, focusing on profiling and tracing operations.
        # They are classified as mandatory_success due to the critical nature of execution tracing in performance analysis.
        # The relevant Spyre capabilities include support for various ops and dtypes, but some ops like 'convolution' and 'gelu' are not fully supported.
        - names:
            - TestExecutionTrace::test_execution_trace_alone
            - TestExecutionTrace::test_execution_trace_env_disabled
            - TestExecutionTrace::test_execution_trace_repeat_in_loop
            - TestExecutionTrace::test_execution_trace_start_stop
            - TestExecutionTrace::test_execution_trace_with_kineto
          mode: mandatory_success
        # These tests exercise execution tracing capabilities, including environment settings and loop behavior.
        # They are classified as xfail due to the missing 'dxp_standalone' executable, indicating a setup issue.
        # The Spyre backend requires the 'dxp_standalone' tool for certain compilation tasks, which is currently unavailable.
        - names:

            - TestExecutionTrace::test_execution_trace_env_enabled_with_kineto

          mode: xfail  # xfail: dxp_standalone not detected
        # These tests exercise PyTorch's execution trace functionality, including tensor data recording and profiling with PyTorch 2.0.
        # They are skipped because they do not interact with the torch-spyre layer, which is required for backend-specific operations.
        # Relevant Spyre capabilities include tensor operations and profiling, but these tests do not leverage those features directly.
        - names:
            - TestExecutionTrace::test_execution_trace_env_enabled_with_pt2
            - TestExecutionTrace::test_execution_trace_no_capture
            - TestExecutionTrace::test_execution_trace_record_integral_tensor_data
            - TestExecutionTrace::test_execution_trace_record_integral_tensor_range
            - TestExecutionTrace::test_execution_trace_with_pt2
            - TestExecutionTrace::test_triton_fx_graph_with_et
            - TestExecutionTrace::test_execution_trace_nested_tensor
          mode: skip  # does not engage the torch-spyre layer

  global:
