test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/nn/test_embedding.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise embedding operations with various modes and data types, including out-of-bounds index handling.
        # They are classified as mandatory_success due to the critical nature of embedding ops in NLP models.
        # Relevant Spyre capabilities include support for float32 and int64 dtypes, and handling of out-of-bounds indices.
        - names:
            - TestEmbeddingNN::test_move_sparse_half_embedding
            - TestEmbeddingNNDeviceType::test_embedding_bag_out_of_bounds_idx
            - TestEmbeddingNNDeviceType::test_embedding_scalar_weight_error
          mode: mandatory_success
        # These tests exercise various aspects of the `EmbeddingBag` operation, including different data types, tensor behaviors, and edge cases.
        # They are classified as `xfail` on the Spyre backend due to unsupported data types, missing features, and unexpected stick expressions.
        # The most relevant Spyre capabilities or limitations include unsupported data types like `Double` and `bfloat16`, and unsupported stick expressions in the backend.
        - names:
            - TestEmbeddingNNDeviceType::test_EmbeddingBag_empty_per_sample_weights_and_offsets
            - TestEmbeddingNNDeviceType::test_EmbeddingBag_per_sample_weights_and_new_offsets
            - TestEmbeddingNNDeviceType::test_EmbeddingBag_per_sample_weights_and_no_offsets
            - TestEmbeddingNNDeviceType::test_EmbeddingBag_per_sample_weights_and_offsets
            - TestEmbeddingNNDeviceType::test_EmbeddingBag_per_sample_weights_failures
            - TestEmbeddingNNDeviceType::test_embedding_backward_atomic_accumulate_kernel
            - TestEmbeddingNNDeviceType::test_embedding_backward_atomic_accumulate_kernel_with_padding_idx
            - TestEmbeddingNNDeviceType::test_embedding_backward_large_batch_overflow
            - TestEmbeddingNNDeviceType::test_embedding_bag_1D_padding_idx
            - TestEmbeddingNNDeviceType::test_embedding_bag_2D_padding_idx
            - TestEmbeddingNNDeviceType::test_embedding_bag_bfloat16
            - TestEmbeddingNNDeviceType::test_embedding_bag_device
            - TestEmbeddingNNDeviceType::test_embedding_bag_dimension_errors
            - TestEmbeddingNNDeviceType::test_embedding_bag_empty_input
            - TestEmbeddingNNDeviceType::test_embedding_bag_half
            - TestEmbeddingNNDeviceType::test_embedding_bag_non_contiguous_weight
            - TestEmbeddingNNDeviceType::test_embedding_bag_per_sample_weights_grad
            - TestEmbeddingNNDeviceType::test_embedding_max_norm_backward
            - TestEmbeddingNNDeviceType::test_embedding_max_norm_device
            - TestEmbeddingNNDeviceType::test_embedding_max_norm_fwd_AD
            - TestEmbeddingNNDeviceType::test_embedding_padding_idx
          mode: xfail  # xfail: dxp_standalone not detected
        # These tests exercise embedding and embedding bag operations across various dtypes and tensor configurations.
        # They are classified as 'skip' on the Spyre backend because they do not engage the torch-spyre layer, indicating they bypass Spyre-specific optimizations or capabilities.
        # The most relevant Spyre limitations include unsupported dtypes like Double, which caused a failure in the test_embedding_dense_grad.
        - names:
            - TestEmbeddingNN::test_embedding_bag_from_pretrained
            - TestEmbeddingNN::test_embedding_bag_from_pretrained_padding_idx
            - TestEmbeddingNN::test_embedding_bag_functional
            - TestEmbeddingNN::test_embedding_bag_padding_idx_error
            - TestEmbeddingNN::test_embedding_from_pretrained
            - TestEmbeddingNN::test_embedding_from_pretrained_float32
            - TestEmbeddingNN::test_embedding_from_pretrained_float64
            - TestEmbeddingNN::test_embedding_from_pretrained_int16
            - TestEmbeddingNN::test_embedding_from_pretrained_int32
            - TestEmbeddingNN::test_embedding_from_pretrained_int64
            - TestEmbeddingNN::test_embedding_from_pretrained_int8
            - TestEmbeddingNN::test_embedding_from_pretrained_options
            - TestEmbeddingNN::test_embedding_from_pretrained_padding_idx
            - TestEmbeddingNN::test_embedding_from_pretrained_uint8
            - TestEmbeddingNN::test_embedding_functional
            - TestEmbeddingNN::test_embedding_max_norm
            - TestEmbeddingNN::test_embedding_max_norm_unsorted_repeating_indices
            - TestEmbeddingNN::test_embedding_sparse_basic
            - TestEmbeddingNN::test_embedding_sparse_empty_tensor
            - TestEmbeddingNN::test_embeddingbag_2d_include_last_offset
            - TestEmbeddingNN::test_embeddingbag_from_pretrained
            - TestEmbeddingNN::test_embeddingbag_from_pretrained_options
            - TestEmbeddingNN::test_embeddingbag_include_last_offset
            - TestEmbeddingNN::test_large_tensors
            - TestEmbeddingNNDeviceType::test_embedding_dense_grad
          mode: skip  # does not engage the torch-spyre layer

  global:
