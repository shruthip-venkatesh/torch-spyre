test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/profiler/test_profiler_tree.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise PyTorch's profiler functionality, including memory tracking, record functions, and stack traces with modules and torch functions.
        # They are classified as mandatory_success because they do not interact with the torch-spyre layer, ensuring compatibility with standard PyTorch behavior.
        # The relevant Spyre capability is its support for standard PyTorch profiling without engaging the custom backend.
        - names:
            - TestProfilerTree::test_profiler_experimental_tree
          mode: mandatory_success
        # These tests exercise CUDA-specific profiler functionalities, including detailed tree profiling, stream handling, and memory tracking.
        # They are classified as 'skip' because they do not engage the torch-spyre layer, which is required for backend-specific profiling.
        # The relevant Spyre capability is the lack of direct integration with CUDA-specific profiler features.
        - names:
            - TestProfilerTree::test_profiler_experimental_tree_with_memory
            - TestProfilerTree::test_profiler_experimental_tree_with_record_function
            - TestProfilerTree::test_profiler_experimental_tree_with_stack_and_modules
            - TestProfilerTree::test_profiler_experimental_tree_with_stack_and_torch_dispatch
            - TestProfilerTree::test_profiler_experimental_tree_with_stack_and_torch_function
            - TestProfilerTree::test_profiler_experimental_tree_cuda
            - TestProfilerTree::test_profiler_experimental_tree_cuda_detailed
            - TestProfilerTree::test_profiler_experimental_tree_cuda_with_stream
            - TestProfilerTree::test_profiler_experimental_tree_with_memory_and_stack
          mode: skip  # does not engage the torch-spyre layer

  global:
