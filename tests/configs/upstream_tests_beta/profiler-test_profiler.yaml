test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/profiler/test_profiler.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise various profiling functionalities, including event tracking, memory profiling, and pattern matching.
        # They are classified as mandatory_success because they are critical for verifying the correctness and performance of the profiler on the Spyre backend.
        # This test ensures the PyTorch Profiler correctly reports Conv2d → BatchNorm2d execution, even when optimizations such as fusion or bias removal occur. It verifies accurate operator traces, timings, and memory events. It also confirms that Kineto captures all relevant profiling data without omissions.
        - names:
            - TestExperimentalUtils::test_profiler_conv2d_bias_followed_by_batchnorm2d_pattern
          mode: mandatory_success
        # These tests exercise various profiling functionalities, including event tracking, memory usage, and performance metrics.
        # They are classified as 'skip' on the Spyre backend due to unsupported operations and missing features in the Spyre op database.
        # Relevant Spyre limitations include missing support for certain ops like 'convolution' and 'copy_', and the absence of CUDA-specific profiling capabilities.
        - names:
            - TestExperimentalUtils::test_profiler_for_loop_indexing_pattern
            - TestExperimentalUtils::test_profiler_grad_not_set_to_none_pattern
            - TestExperimentalUtils::test_profiler_name_pattern
            - TestExperimentalUtils::test_profiler_optimizer_single_tensor_pattern
            - TestExperimentalUtils::test_profiler_pattern_match_helper
            - TestExperimentalUtils::test_profiler_pattern_matcher_json_report
            - TestExperimentalUtils::test_profiler_synchronized_dataloader_pattern
            - TestExperimentalUtils::test_utils_compute_queue_depth_when_no_cuda_events
            - TestExperimentalUtils::test_utils_compute_self_time
            - TestProfiler::test_basic_chrome_trace
            - TestProfiler::test_concrete_inputs_profiling
            - TestProfiler::test_concrete_inputs_profiling_toggling
            - TestProfiler::test_forked_process
            - TestProfiler::test_guarded_record_function_fast
            - TestProfiler::test_is_profiler_enabled
            - TestProfiler::test_kineto_profiler_api
            - TestProfiler::test_kineto_profiler_multiple_steppers
            - TestProfiler::test_lazy_build_tree
            - TestProfiler::test_memory_profiler
            - TestProfiler::test_nested_tensor_with_shapes
            - TestProfiler::test_profiler_correlation_id
            - TestProfiler::test_profiler_metadata
