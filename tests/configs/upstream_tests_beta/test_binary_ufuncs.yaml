test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/test_binary_ufuncs.py
      unlisted_test_mode: skip
      tests:
        # These tests exercise various binary operations, dtype conversions, and tensor behaviors.
        # They are classified as mandatory_success due to the critical nature of these operations.
        # Spyre's limitations in dtype support and type conversion during tensor operations are most relevant.
        - names:
            - TestBinaryUfuncs::test_cross_device_inplace_error_msg
            - TestBinaryUfuncs::test_floor_divide_zero
            - TestBinaryUfuncs::test_sub_typing
          mode: mandatory_success
        # These tests exercise binary operations (add, bitwise_and, clamp_max, etc.) with unsupported dtypes (bool, int64).
        # They are classified as mandatory_success because these operations are essential but currently unsupported on Spyre.
        # Relevant Spyre limitations include lack of support for bool and int64 dtypes in these binary operations.
        - names:
            - TestBinaryUfuncs::test_not_broadcastable
          mode: mandatory_success
          edits:
            ops:
              exclude:
                - name: add
                - name: bitwise_and
                - name: clamp_max
                - name: clamp_min
                - name: maximum
                - name: minimum
                - name: mul
                - name: sub
            dtypes:
              exclude:
                - name: bool
                - name: int64
        # These tests exercise the subtraction operation (`sub`) across various dtypes, including unsupported ones like `bfloat16`, `float16`, `float32`, and `int64`.
        # They are classified as `mandatory_success` because the Spyre backend must support these operations for full compatibility.
        # The primary limitation is the absence of the `dxp_standalone` executable, which is crucial for compiling and executing these operations on the Spyre backend.
        - names:
            - TestBinaryUfuncs::test_sub
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: bfloat16
                - name: float16
                - name: float32
                - name: int64
        # These tests exercise binary operations (add, maximum, minimum, mul, sub) with type promotion across different dtypes.
        # They are classified as mandatory_success because these operations are fundamental and must be supported on the Spyre backend.
        # The primary limitation is the lack of support for 'aten::random_.from', affecting the execution of these binary operations.
        - names:
            - TestBinaryUfuncs::test_type_promotion
          mode: mandatory_success
          edits:
            ops:
              exclude:
                - name: add
                - name: maximum
                - name: minimum
                - name: mul
                - name: sub
        # These tests exercise binary operations and their interactions with various data types and tensor behaviors.
        # They are classified as xfail on the Spyre backend due to missing support for certain operations and data type conversions.
        # Relevant Spyre limitations include unsupported stick expressions, missing device tensor layouts, and type conversion restrictions.
        - names:
            - TestBinaryUfuncs::test_scalar_support
            - TestBinaryUfuncs::test_heaviside
            - TestBinaryUfuncs::test_int_tensor_pow_neg_ints
            - TestBinaryUfuncs::test_add
            - TestBinaryUfuncs::test_add_with_tail
            - TestBinaryUfuncs::test_addsub_half_tensor
            - TestBinaryUfuncs::test_binary_ops_with_scalars
            - TestBinaryUfuncs::test_bool_tensor_comparison_ops
            - TestBinaryUfuncs::test_cdiv
            - TestBinaryUfuncs::test_cmul
            - TestBinaryUfuncs::test_cpow
            - TestBinaryUfuncs::test_csub
            - TestBinaryUfuncs::test_cuda_tensor_pow_scalar_tensor
            - TestBinaryUfuncs::test_div
            - TestBinaryUfuncs::test_div_and_floordiv_vs_python
            - TestBinaryUfuncs::test_division_by_scalar
            - TestBinaryUfuncs::test_divmul_scalar
            - TestBinaryUfuncs::test_floor_div_extremal
            - TestBinaryUfuncs::test_floor_divide_scalar
            - TestBinaryUfuncs::test_floor_divide_tensor
            - TestBinaryUfuncs::test_idiv_and_ifloordiv_vs_python
            - TestBinaryUfuncs::test_inplace_division
            - TestBinaryUfuncs::test_inplace_dunders
            - TestBinaryUfuncs::test_lerp_lowp
            - TestBinaryUfuncs::test_lerp_lowp_cpu
            - TestBinaryUfuncs::test_logaddexp
            - TestBinaryUfuncs::test_logaddexp2
            - TestBinaryUfuncs::test_logical
            - TestBinaryUfuncs::test_long_tensor_pow_floats
            - TestBinaryUfuncs::test_maximum_minimum_cross_device
            - TestBinaryUfuncs::test_min_max_binary_op_nan
            - TestBinaryUfuncs::test_mul
            - TestBinaryUfuncs::test_mul_intertype_scalar
            - TestBinaryUfuncs::test_pow_scalar_type_promotion
            - TestBinaryUfuncs::test_rdiv
            - TestBinaryUfuncs::test_trapezoid
            - TestBinaryUfuncs::test_true_divide_out
          mode: xfail  # xfail: torch._inductor.exc.InductorError
        # These tests exercise various binary operations and tensor manipulations, including broadcasting and scalar operations.
        # They are classified as xfail due to unsupported dtypes (Double, ComplexFloat) and unimplemented operations (exp2).
        # The relevant Spyre limitations are the lack of support for Double and ComplexFloat dtypes, and the unimplemented exp2 operation.
        - names:
            - TestBinaryUfuncs::test_add_broadcast_empty
            - TestBinaryUfuncs::test_atan2
            - TestBinaryUfuncs::test_float_power_exceptions
            - TestBinaryUfuncs::test_pow_scalar_base
            - TestBinaryUfuncs::test_rpow
          mode: xfail  # xfail: RuntimeError
        # These tests exercise a variety of binary operations and edge cases across different data types.
        # They are classified as xfail on the Spyre backend due to missing implementations of specific operators.
        # Relevant Spyre limitations include the absence of support for certain binary operations and data types.
        - names:
            - TestBinaryUfuncs::test_addcmul_scalars_as_floats
            - TestBinaryUfuncs::test_atan2_edgecases
            - TestBinaryUfuncs::test_bitwise_ops
            - TestBinaryUfuncs::test_cremainder
            - TestBinaryUfuncs::test_floor_divide_int_min
            - TestBinaryUfuncs::test_fmod_remainder_overflow
            - TestBinaryUfuncs::test_gcd
            - TestBinaryUfuncs::test_heaviside_cross_device
            - TestBinaryUfuncs::test_hypot
            - TestBinaryUfuncs::test_int_and_float_pow
            - TestBinaryUfuncs::test_lcm
            - TestBinaryUfuncs::test_ldexp
            - TestBinaryUfuncs::test_lerp
            - TestBinaryUfuncs::test_nextafter
            - TestBinaryUfuncs::test_nextafter_bfloat16
            - TestBinaryUfuncs::test_out_resize_warning
            - TestBinaryUfuncs::test_remainder_overflow
            - TestBinaryUfuncs::test_shift_limits
            - TestBinaryUfuncs::test_signed_shift
          mode: xfail  # xfail: NotImplementedError
        # These tests exercise binary operations (add, bitwise_and, clamp_max, etc.) across various dtypes and tensor shapes, including non-contiguous and transposed tensors.
        # They are classified as xfail due to NotImplementedError and InductorError, indicating unsupported operations or missing backend capabilities.
        # Relevant Spyre limitations include lack of support for certain ops with specific dtypes and issues with non-contiguous tensor handling.
        - names:
            - TestBinaryUfuncs::test_batch_vs_slicing
            - TestBinaryUfuncs::test_broadcasting
            - TestBinaryUfuncs::test_contig_size1
            - TestBinaryUfuncs::test_contig_vs_transposed
            - TestBinaryUfuncs::test_non_contig
            - TestBinaryUfuncs::test_non_contig_expand
            - TestBinaryUfuncs::test_non_contig_index
            - TestBinaryUfuncs::test_reference_numerics
          mode: xfail  # xfail: NotImplementedError, torch._inductor.exc.InductorError
        # These tests exercise a wide range of binary operations, including comparison, arithmetic, and logical operations, across various data types and tensor shapes.
        # They are classified as xfail on the Spyre backend due to known issues with type promotion, unsupported operations, and missing features in the backend implementation.
        # Relevant Spyre capabilities include support for bfloat16, bool, float16, float32, and int64 data types, as well as a subset of operations like add, mul, maximum, minimum, and bitwise_and. Limitations include unsupported operations like exp2, pow, and certain complex operations, as well as issues with type promotion and handling of non-finite values.
        - names:
            - TestBinaryUfuncs::test_comparison_ops_type_promotion_and_broadcasting
            - TestBinaryUfuncs::test_contig_size1_large_dim
            - TestBinaryUfuncs::test_contig_vs_every_other
            - TestBinaryUfuncs::test_copysign_subgradient
            - TestBinaryUfuncs::test_cpu_tensor_pow_cuda_scalar_tensor
            - TestBinaryUfuncs::test_div_and_floordiv_script_vs_python
            - TestBinaryUfuncs::test_div_rounding_nonfinite
            - TestBinaryUfuncs::test_float_scalar_pow_float_tensor
            - TestBinaryUfuncs::test_fmod_remainder_by_zero_float
            - TestBinaryUfuncs::test_fmod_remainder_by_zero_integral
            - TestBinaryUfuncs::test_lerp_weight_scalar_tensor_promotion
            - TestBinaryUfuncs::test_logical_xor_with_nontrivial_alignment
            - TestBinaryUfuncs::test_maximum_and_minimum_subgradient
            - TestBinaryUfuncs::test_maximum_minimum_float_nan_and_inf
            - TestBinaryUfuncs::test_maximum_minimum_forward_ad_float32
            - TestBinaryUfuncs::test_maximum_minimum_int_and_bool
            - TestBinaryUfuncs::test_maximum_minimum_type_promotion
            - TestBinaryUfuncs::test_pow_inplace_resizing_exception
            - TestBinaryUfuncs::test_reference_numerics_extremal_values
            - TestBinaryUfuncs::test_reference_numerics_large_values
            - TestBinaryUfuncs::test_reference_numerics_small_values
            - TestBinaryUfuncs::test_remainder_fmod_large_dividend
            - TestBinaryUfuncs::test_xlogy_xlog1py_scalar_type_promotion
          mode: xfail  # xfail: dxp_standalone not detected
        # These tests exercise logical and copysign operations across various dtypes and tensor behaviors.
        # They are classified as xfail due to NotImplementedError and RuntimeError, indicating missing or unsupported operators and dtypes.
        # The most relevant Spyre limitations are the lack of support for double-precision floats and certain logical operations.
        - names:
            - TestBinaryUfuncs::test_copysign
            - TestBinaryUfuncs::test_logical_and
            - TestBinaryUfuncs::test_logical_or
            - TestBinaryUfuncs::test_logical_xor
          mode: xfail  # xfail: NotImplementedError, RuntimeError
        # These tests exercise binary operations (div, fmod, remainder, mul, pow) across various dtypes.
        # They are classified as xfail due to Spyre backend limitations in handling certain dtypes and ops.
        # Relevant Spyre limitations include unsupported dtypes like bfloat16 and float16 in some ops.
        - names:
            - TestBinaryUfuncs::test_div_rounding_modes
            - TestBinaryUfuncs::test_div_rounding_numpy
            - TestBinaryUfuncs::test_fmod_remainder
            - TestBinaryUfuncs::test_muldiv_scalar
            - TestBinaryUfuncs::test_pow
          mode: xfail  # xfail: NotImplementedError, torch._inductor.exc.InductorError
        # These tests exercise the `float_power` operation across various dtype combinations.
        # They are classified as xfail due to Spyre's lack of support for certain dtypes and operators.
        # Relevant limitations include unsupported dtypes like `float64` and missing operators like `aten::random_.from`.
        - names:
            - TestBinaryUfuncs::test_float_power
          mode: xfail  # xfail: NotImplementedError, RuntimeError, torch._inductor.exc.InductorError
        # These tests exercise maximum and minimum operations across various float dtypes.
        # They are classified as xfail due to missing 'dxp_standalone' executable, causing InductorError.
        # Relevant Spyre capability: support for maximum and minimum ops across multiple dtypes.
        - names:
            - TestBinaryUfuncs::test_maximum_minimum_float
          mode: xfail  # xfail: torch._inductor.exc.InductorError
        # These tests exercise the `pow` operation between tensors, which is critical for various mathematical computations.
        # They are classified as `xfail` due to a `RecursionError`, indicating a limitation in the Spyre backend's handling of recursive operations.
        # The relevant Spyre capability is the support for basic arithmetic operations, but the backend struggles with deep recursion in certain tensor operations.
        - names:
            - TestBinaryUfuncs::test_tensor_pow_tensor
          mode: xfail  # xfail: RecursionError
        # These tests exercise binary operations, cumulative trapezoid integration, and special functions like xlogy and zeta across various dtypes and tensor behaviors.
        # They are classified as 'skip' because they do not engage the torch-spyre layer, typically due to unsupported dtypes or operations.
        # Relevant Spyre limitations include lack of support for certain dtypes and operations, such as bool and int64 in some special functions.
        - names:
            - TestBinaryUfuncs::test_complex_scalar_pow_tensor
            - TestBinaryUfuncs::test_binary_op_scalar_device_unspecified
            - TestBinaryUfuncs::test_cross_device_binary_ops
            - TestBinaryUfuncs::test_cumulative_trapezoid
            - TestBinaryUfuncs::test_divide_by_zero_rounding
            - TestBinaryUfuncs::test_xlogy_xlog1py
            - TestBinaryUfuncs::test_xlogy_xlog1py_bfloat16
            - TestBinaryUfuncs::test_zeta
          mode: skip  # does not engage the torch-spyre layer

