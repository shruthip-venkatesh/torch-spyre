test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/inductor/test_exc_lowering_stack_trace.py
      unlisted_test_mode: skip
      tests:
        # These tests verify the stack trace inclusion in exception handling for PyTorch operations like `aten.ceil.default`.
        # They are classified as `mandatory_success` because they do not interact with the Spyre backend, focusing on CPU behavior.
        # Relevant Spyre capabilities include handling of CPU-based tensor operations and exception stack traces.
        - names:
            - TestLoweringExceptionStackTrace::test_lowering_exception_includes_stack_trace
          mode: mandatory_success
        # These tests verify exception handling without stack traces in PyTorch.
        # They are skipped because they do not interact with the torch-spyre layer.
        # Relevant Spyre limitation: lack of device-specific exception handling.
        - names:
            - TestLoweringExceptionStackTrace::test_lowering_exception_without_stack_trace
          mode: skip  # does not engage the torch-spyre layer

  global:
