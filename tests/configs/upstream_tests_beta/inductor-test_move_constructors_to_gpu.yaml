test_suite_config:

  files:
    - path: ${TORCH_ROOT}/test/inductor/test_move_constructors_to_gpu.py
      unlisted_test_mode: skip
      tests:
        # These tests verify tensor construction and movement to GPU without invoking any specific operations.
        # They are classified as mandatory_success because they do not require any Spyre-specific operations or features.
        # The tests highlight Spyre's capability to handle basic tensor management without specialized ops.
        - names:
            - TestMoveConstructorsToGpu::test_multiple_constructors
          mode: mandatory_success
        # These tests exercise GPU tensor operations and constructors, but do not engage the torch-spyre layer.
        # They are classified as 'skip' because the torch-spyre layer is not involved in these tests.
        # The primary limitation is that the torch-spyre layer is not engaged, so Spyre capabilities are irrelevant.
        - names:
            - TestMoveConstructorsToGpu::test_multi_gpu
            - TestMoveConstructorsToGpu::test_non_convertable_op_failure
            - TestMoveConstructorsToGpu::test_output_failure
            - TestMoveConstructorsToGpu::test_sets_equiv
            - TestMoveConstructorsToGpu::test_simple
            - TestMoveConstructorsToGpu::test_no_gpu
          mode: skip  # does not engage the torch-spyre layer

  global:
    supported_dtypes:
      - name: bfloat16
      - name: bool
      - name: float16
      - name: float32
      - name: int64
    supported_ops:
