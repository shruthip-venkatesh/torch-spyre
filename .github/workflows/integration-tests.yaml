name: integration-tests

# ---------------------------------------------------------------------------
# Triggered by commits in upstream dependant repos (deeptools, flex, etc.) via
# workflow_dispatch.  Runs the device_critical test subset (streams, job
# launch plans, codegen, LX/scratchpad planning, tensor layout, allocator/GC,
# D2D copies -- the device-layer surfaces these upstream tools exercise
# most) against a specified torch-spyre ref so regressions from upstream
# changes are caught early. Pass test_type=full for full coverage.
#
# Example caller pattern from an upstream repo's workflow:
#
#   gh workflow run integration-tests.yaml \
#     --repo <org>/torch-spyre \
#     -f triggering_repo=<repo link to deeptools/flex> \
#     -f triggering_sha=${{ github.sha }} \
#     -f pr_url_hash=$(echo -n "${{ github.event.pull_request.html_url }}" | sha256sum | cut -c1-16)
#
# Tests the PRE-BAKED torch-spyre-dev image (prebaked_image=true, default): no
# checkout/build/RPM-install on the runner.
# ---------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      # ---- Upstream provenance ----------------
      triggering_repo:
        description: Name of the upstream repo that triggered this run (e.g. "deeptools", "flex")
        required: false
        type: string
        default: ''
      triggering_sha:
        description: Commit SHA in the upstream repo that triggered this run
        required: false
        type: string
        default: ''
      pr_url_hash:
        description: |
          Hash of the full URL of the upstream PR that triggered this run.
          Used to key the concurrency group so that re-runs for the same PR
          cancel any in-flight run. Leave empty for non-PR triggers.
        required: false
        type: string
        default: ''

      # ---- torch-spyre ref to test ----------
      ref:
        description: Branch, tag, or SHA of torch-spyre to check out and test
        required: false
        type: string
        default: ''
      repository:
        description: Full clone URL of a torch-spyre fork (e.g. "https://github.com/myuser/torch-spyre.git"); leave empty for the base repo
        required: false
        type: string
        default: ''

      # ---- image override ------------------
      # NOTE: rpm_location / rpm_names / build_torch_spyre are intentionally NOT
      # exposed here. This entrypoint tests the PRE-BAKED torch-spyre-dev image
      # (prebaked_image, default true) — nothing is built or RPM-installed on the
      # runner, so those knobs are meaningless. _test_matrix.yaml still declares
      # them (workflow_call, no input cap) for its legacy callers; on the
      # prebaked_image=false fallback it uses their defaults (build_torch_spyre
      # true, rpm_names ''). Dropping them also keeps this workflow_dispatch under
      # the hard 10-input cap.
      runner_label:
        description: |
          Per-PR ephemeral runner-set IMAGE label
          (image_spyre_backend_pr_<component>_<sha12>).
          Leave empty to use the standing image_spyre_backend set.
        required: false
        type: string
        default: ''
      test_type:
        description: >-
          Suite subset to run: smoke | core | full | device_critical |
          suite_<group> | <label>. Default: device_critical (configs whose
          test_suite_config.labels cover the device-layer surfaces flex and
          deeptools/dxp_standalone exercise most -- streams, job launch
          plans, codegen, LX/scratchpad planning, tensor layout,
          allocator/GC, D2D copies). Pass "full" to run every config.
        required: false
        type: string
        default: device_critical
      prebaked_image:
        description: >-
          Test the pre-baked torch-spyre-dev image directly (no checkout/build) —
          the Spyre-Next default for this entrypoint. The ephemeral runner is FROM
          torch-spyre-dev, which already has the editable torch_spyre + full source
          + venv. Set false to fall back to the legacy checkout+build path.
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.pull_request.html_url) || (github.event_name == 'workflow_dispatch'
    && inputs.pr_url_hash != '' && inputs.pr_url_hash) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Print a summary of what triggered this run so it is tracked
  # ---------------------------------------------------------------------------
  provenance:
    name: Log upstream dependant tool regression trigger
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          {
            echo "## Integration test triggered by upstream change"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Upstream repo   | ${{ inputs.triggering_repo || '(not specified)' }} |"
            echo "| Upstream commit | ${{ inputs.triggering_sha || '(not specified)' }} |"
            echo "| PR URL hash     | ${{ inputs.pr_url_hash || '(not specified)' }} |"
            echo "| torch-spyre ref | ${{ inputs.ref || github.sha }} |"
            echo "| prebaked image  | ${{ inputs.prebaked_image }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Run the test matrix, defaulting to the device_critical subset -- same
  # default as the "run-tests" job in torch_spyre_tests.yaml. Callers can
  # still request test_type=full for complete coverage.
  # ---------------------------------------------------------------------------
  run-tests:
    needs: provenance
    uses: ./.github/workflows/_test_matrix.yaml
    with:
      runner_label: linux
      image_label: ${{ inputs.runner_label || 'image_spyre_backend' }}
      extra_test_flags: -v
      checkout_pytorch: false
      ref: ${{ inputs.ref || '' }}
      repository: ${{ inputs.repository || '' }}
      test_type: ${{ inputs.test_type || 'device_critical' }}
      prebaked_image: ${{ inputs.prebaked_image }}

  # ----------------------------------------------------------------------------------
  # Fan-in gate job which is similar to run-spyre-unit-tests in torch_spyre_tests.yaml
  # so callers can poll a single stable job name for pass/fail.
  # ----------------------------------------------------------------------------------
  integration-test-result:
    name: Integration test result
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
      - name: Evaluate test results
        run: |
          RESULT="${{ needs.run-tests.result }}"
          echo "run-tests result: ${RESULT}"

          if [[ "${RESULT}" == "success" ]]; then
            echo "All integration test suites passed."
            exit 0
          fi

          echo "One or more integration test suites failed or were cancelled."
          exit 1
