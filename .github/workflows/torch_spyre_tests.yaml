name: tests

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to check out and test
        required: false
        type: string
        default: ''
      repository:
        description: Full clone URL of the fork to check out (e.g. "https://github.com/myuser/torch-spyre.git"); leave empty for the base repo
        required: true
        type: string
        default: ''
      pr_url_hash:
        description: |
          Hash of the full URL of the PR that triggered this run.
          Required when triggered by an external PR.
        required: true
        type: string
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ''
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ''
      build_torch_spyre:
        description: Whether to re-build torch-spyre after installing the RPM
        required: false
        type: boolean
        default: true
      runner_label:
        description: |
          Per-PR ephemeral runner-set IMAGE label to select
          (image_spyre_backend_pr_<component>_<sha12>, e.g. image_spyre_backend_pr_flex_8ddcf3e155e9).
          Empty = use the standing image_spyre_backend set (the RPM is then installed at
          runtime via rpm_names; the ephemeral flow leaves this set and rpm_names empty).
        required: false
        type: string
        default: ''
      test_type:
        description: >-
          Suite subset to run: smoke | core | full | suite_<group> | <label>.
          Default: full (every config).
        required: false
        type: string
        default: full

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.pull_request.html_url) || (github.event_name == 'workflow_dispatch'
    && inputs.pr_url_hash != '' && inputs.pr_url_hash) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: read # so that gh pr view can fetch the file list

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: changes
  #
  # Runs on every PR and merge-queue check. Delegates to the shared
  # detect-doc-only-change composite action, which checks if any file outside
  # tests/docs/, docs/, README.md, or CODEOWNERS was modified.
  #
  # code_changed=true  --> non-doc files changed  --> run tests
  # code_changed=false --> only doc/CODEOWNERS files changed --> skip tests
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Check which paths changed
        id: filter
        uses: ./.github/actions/detect-doc-only-change

  # ---------------------------------------------------------------------------
  # Job 2: delegate to the shared test matrix
  #
  # Only runs when `changes.code_changed == 'true'`. For docs-only PRs the
  # reusable workflow is never invoked — no hardware runners are consumed.
  # ---------------------------------------------------------------------------
  run-tests:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    uses: ./.github/workflows/_test_matrix.yaml
    with:
      runner_label: linux
      # Per-PR ephemeral image label when provided, else the standing set.
      image_label: ${{ inputs.runner_label || 'image_spyre_backend' }}
      extra_test_flags: -v -m "not xfail"
      extra_test_flags_multi_spyre: -v
      checkout_pytorch: false
      ref: ${{ inputs.ref || '' }}
      repository: ${{ inputs.repository || '' }}
      rpm_location: ${{ inputs.rpm_location || '' }}
      rpm_names: ${{ inputs.rpm_names || '' }}
      build_torch_spyre: ${{ inputs.build_torch_spyre == true }}
      test_type: ${{ inputs.test_type || 'full' }}

  # ---------------------------------------------------------------------------
  # Job 3: run-spyre-unit-tests (required check gate)
  #
  # This job name MUST match the branch protection required check exactly:
  #   "tests / Run Spyre unit tests"
  #
  # It fans in the reusable workflow result. Three outcomes are handled:
  #
  #   run-tests result = success -> all suites passed      -> green
  #   run-tests result = skipped -> docs-only PR, no tests -> green (instant)
  #   run-tests result = failure -> one or more suites bad -> red   (blocks merge)
  # ---------------------------------------------------------------------------
  run-spyre-unit-tests:
    name: Run Spyre unit tests
    runs-on: ubuntu-latest
    needs: [changes, run-tests]
    if: always()
    steps:
      - name: Evaluate test results
        run: |-
          RESULT="${{ needs.run-tests.result }}"
          echo "run-tests result: ${RESULT}"

          if [[ "${RESULT}" == "success" ]]; then
            echo "All test suites passed."
            exit 0
          fi

          if [[ "${RESULT}" == "skipped" ]]; then
            echo "Tests skipped — docs-only change, no test-relevant files modified."
            exit 0
          fi

          echo "One or more test suites failed or were cancelled."
          exit 1
